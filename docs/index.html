<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三下練習</title>
<meta name="robots" content="noindex">
<style>
  body { font-family: -apple-system, "PingFang TC", sans-serif; background: #f5f7fa;
         display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
  a { color: #2d6cdf; font-size: 1.1rem; }
</style>
</head>
<body>
<!-- 舊入口跳轉頁（#30）：題庫已移至 /study/。#31 的 hub 落地後這頁會被 hub 取代。
     相對路徑 "study/"：GH Pages 專案頁（/aiden-study/）與自訂網域（/）兩邊都對，寫死 "/study/" 會炸掉前者。
     search 與 hash 都要帶過去——
       hash：備忘錄還原捷徑寫死舊根網址帶 #restore=，丟了＝還原靜默失敗
       search：圖示網址帶 ?child=&k=，丟了＝身分退回 LEGACY_CHILD，弟弟的作答寫進哥哥的存檔 -->
<a id="go" href="study/">前往題庫</a>
<script>
// 連結與自動跳轉走同一個目標：只要 JS 有跑，兩條路徑都帶著參數
// （JS 全關時題庫本來就不能用，那個連結只是告知「搬家了」）
var target = "study/" + location.search + location.hash;
document.getElementById("go").href = target;
location.replace(target);
</script>
</body>
</html>
