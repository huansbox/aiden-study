<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<!-- 加到主畫面後以 app 形式（standalone）開啟，無瀏覽器網址列 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="三下練習">
<meta name="theme-color" content="#f5f7fa">
<link rel="manifest" href="manifest.json">
<title>三下練習</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, "Noto Sans TC", "Microsoft JhengHei", sans-serif;
  background: #f5f7fa;
  color: #1a1a2e;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  -webkit-user-select: none;
  user-select: none;
}

.container {
  width: 100%;
  max-width: 768px;
  padding: 16px;
  /* 加到主畫面 standalone 開啟時，避開瀏海/狀態列與底部 home indicator */
  padding-top: max(16px, env(safe-area-inset-top));
  padding-bottom: max(16px, env(safe-area-inset-bottom));
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* ── 首頁 ── */
.home { padding-top: 32px; }
.home h1 { font-size: 1.6rem; text-align: center; margin-bottom: 16px; }

/* 科目切換（自然/數學）：active 用實心藍，與學期切換區隔 */
.subject-toggle {
  display: flex; gap: 6px; margin-bottom: 12px;
  background: #eef1f6; padding: 6px; border-radius: 14px;
}
.subject-toggle button {
  flex: 1; padding: 12px; border: none; border-radius: 10px;
  background: transparent; font-size: 1.05rem; font-weight: 600;
  color: #777; cursor: pointer; transition: all 0.15s;
}
.subject-toggle button.active {
  background: #4361ee; color: #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.12);
}

/* 科目尚無題目時的空狀態 */
.empty-state {
  background: #fff; border: 2px dashed #d8dee9; border-radius: 14px;
  padding: 32px 20px; text-align: center; color: #889; font-size: 1.05rem;
}

/* 期中/期末 切換 */
.semester-toggle {
  display: flex; gap: 6px; margin-bottom: 24px;
  background: #eef1f6; padding: 6px; border-radius: 14px;
}
.semester-toggle button {
  flex: 1; padding: 12px; border: none; border-radius: 10px;
  background: transparent; font-size: 1.05rem; font-weight: 600;
  color: #777; cursor: pointer; transition: all 0.15s;
}
.semester-toggle button.active {
  background: #fff; color: #4361ee; box-shadow: 0 1px 4px rgba(0,0,0,0.12);
}

.unit-section { margin-bottom: 20px; }
.unit-section .unit-title {
  font-size: 1.1rem; font-weight: 700;
  margin-bottom: 8px; padding-left: 4px;
}

.sub-btn {
  display: flex; justify-content: space-between; align-items: center;
  width: 100%; padding: 18px 20px; margin-bottom: 8px;
  border: 2px solid #e0e0e0; border-radius: 14px;
  background: #fff; font-size: 1.05rem; font-weight: 500;
  cursor: pointer; transition: all 0.15s; text-align: left;
}
.sub-btn:active:not(:disabled) { transform: scale(0.98); }
.sub-btn:hover:not(:disabled) { border-color: #4361ee; background: #f0f4ff; }
.sub-btn:disabled { opacity: 0.4; cursor: default; }
.sub-btn .status { font-size: 0.85rem; color: #888; white-space: nowrap; margin-left: 12px; }
.sub-btn .badge {
  background: #e74c3c; color: #fff; border-radius: 10px;
  padding: 2px 10px; font-size: 0.85rem; font-weight: 600;
  min-width: 28px; text-align: center; margin-left: 12px;
}

/* subtopic 依概念練習 */
.subtopic-list { margin: 6px 0 4px; padding: 4px 0 0; }
.subtopic-head { font-size: 0.8rem; color: #999; margin: 6px 4px; }
.subtopic-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; margin-bottom: 6px;
  border: 1px solid #ececec; border-radius: 10px; background: #fafbfc;
}
.subtopic-name { font-size: 0.98rem; font-weight: 500; }
.st-count { font-size: 0.78rem; color: #999; margin-left: 8px; font-weight: 400; }
.st-actions { display: flex; gap: 6px; flex-shrink: 0; }
.st-btn {
  padding: 7px 14px; border: 1px solid #cdd6ff; border-radius: 8px;
  background: #fff; color: #4361ee; font-size: 0.9rem; font-weight: 600;
  cursor: pointer;
}
.st-btn:active { transform: scale(0.96); background: #f0f4ff; }

.error-section { border-top: 2px solid #eee; padding-top: 20px; margin-top: 8px; }

.no-errors {
  background: #e8faf0; border-radius: 14px; padding: 20px;
  text-align: center; color: #1a7a42; font-size: 1.1rem; font-weight: 600;
}
.no-errors::before { content: ""; display: block; font-size: 2rem; margin-bottom: 4px; }

.reset-link {
  display: inline-block; margin-top: 4px;
  font-size: 0.8rem; color: #888; text-decoration: underline;
  cursor: pointer; background: none; border: none;
}

/* ── Quiz Header ── */
.quiz-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.leave-btn {
  background: none; border: 1px solid #ddd; border-radius: 8px;
  padding: 8px 14px; font-size: 0.95rem; color: #666; cursor: pointer;
}
.leave-btn:active { background: #f0f0f0; }
.mode-label { font-size: 0.85rem; color: #999; }

/* ── 進度 ── */
.progress-bar {
  display: flex; align-items: center; gap: 4px;
  margin-bottom: 12px; flex-wrap: wrap;
}
.progress-bar .label { font-size: 0.9rem; color: #666; margin-right: 8px; white-space: nowrap; }
.dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: #ddd; flex-shrink: 0;
}
.dot.correct { background: #2ecc71; }
.dot.wrong { background: #e74c3c; }
.dot.current { box-shadow: 0 0 0 2px #4361ee; }

.progress-text { margin-bottom: 12px; }
.progress-text .text-line { font-size: 0.9rem; color: #666; margin-bottom: 6px; }
.progress-bar-track {
  height: 8px; background: #eee; border-radius: 4px; overflow: hidden;
}
.progress-bar-fill {
  height: 100%; background: #2ecc71; border-radius: 4px;
  transition: width 0.3s ease;
}

/* ── 題目 ── */
.question-card {
  background: #fff; border-radius: 16px;
  padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  flex: 1; display: flex; flex-direction: column;
}
.q-type {
  font-size: 0.8rem; color: #fff; background: #4361ee;
  display: inline-block; padding: 2px 10px; border-radius: 8px;
  margin-bottom: 12px; align-self: flex-start;
}
.q-type.tf { background: #8b5cf6; }
.q-type.chinese { background: #0f766e; }
.q-text { font-size: 1.25rem; line-height: 1.7; margin-bottom: 20px; }
/* 看表題截圖（題幹上方顯示）；寬表（如高鐵時刻表 12 欄）需吃滿容器寬才可讀 */
.q-image {
  width: 100%; align-self: center;
  border: 1px solid #e0e0e0; border-radius: 10px; margin-bottom: 12px;
}
.options { display: flex; flex-direction: column; gap: 12px; }

.opt-btn {
  display: flex; align-items: center; min-height: 56px;
  padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 12px;
  background: #fff; font-size: 1.125rem; line-height: 1.5;
  cursor: pointer; transition: all 0.15s; text-align: left; gap: 10px;
}
.opt-btn:active:not(.disabled) { transform: scale(0.98); }
.opt-btn:hover:not(.disabled) { border-color: #4361ee; background: #f0f4ff; }
.opt-btn .opt-label {
  width: 28px; height: 28px; border-radius: 50%; background: #eee;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 0.9rem; flex-shrink: 0;
}
.opt-btn.correct-answer { border-color: #2ecc71; background: #e8faf0; }
.opt-btn.correct-answer .opt-label { background: #2ecc71; color: #fff; }
.opt-btn.wrong-answer { border-color: #e74c3c; background: #fdecea; }
.opt-btn.wrong-answer .opt-label { background: #e74c3c; color: #fff; }
.opt-btn.disabled { pointer-events: none; opacity: 0.85; }

/* ── 國語改錯字（chinese_correction）── */
.chinese-sentence {
  display: flex; flex-wrap: wrap; gap: 6px 4px;
  align-items: center; line-height: 1.8;
}
.chinese-char {
  min-width: 38px; min-height: 44px; padding: 4px 6px;
  border: 1px solid #d8dee9; border-radius: 8px; background: #fff;
  color: #1a1a2e; font: inherit; font-size: 1.55rem; line-height: 1;
  cursor: pointer; transition: transform 0.12s, background 0.12s, border-color 0.12s;
}
.chinese-char:active:not(:disabled) { transform: scale(0.96); }
.chinese-char:hover:not(:disabled) { border-color: #0f766e; background: #effdf8; }
.chinese-char.miss { border-color: #ef4444; background: #fff1f2; animation: charShake 0.22s ease-in-out; }
.chinese-char.picked { border-color: #0f766e; background: #ccfbf1; color: #0f3f3a; font-weight: 800; }
.chinese-char:disabled { cursor: default; opacity: 1; }
.chinese-punct { font-size: 1.35rem; padding: 0 1px; color: #2d2d3a; }
.chinese-inline-hint {
  min-height: 28px; margin-top: 4px; color: #b42318;
  font-size: 0.95rem; font-weight: 600;
}
@keyframes charShake {
  0%, 100% { transform: translateX(0); }
  30% { transform: translateX(-3px); }
  70% { transform: translateX(3px); }
}

/* ── 填充題（fill_in_blank）── */
.q-type.fib { background: #0d9488; }
.blank-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 4px; }
.blank-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.blank-label { font-size: 1.05rem; color: #666; min-width: 48px; }
/* 題幹空格 chip：長得像輸入格而非題目內容（避免（２）被誤讀成數字 2）；
   與下方作答格同步 highlight，作答時即時回填輸入值 */
.q-chip {
  display: inline-block; min-width: 44px; padding: 0 10px;
  border: 2px dashed #bbb; border-radius: 8px; background: #fafafa;
  color: #999; text-align: center; line-height: 1.5;
  margin: 0 2px; cursor: pointer; user-select: none;
}
.q-chip.filled { border-style: solid; border-color: #999; background: #fff; color: #222; }
.q-chip.active { border-color: #4361ee; background: #f0f4ff; color: #4361ee; }
.q-chip.b-correct { border-style: solid; border-color: #2ecc71; background: #e8faf0; color: #1a7a44; }
.q-chip.b-wrong { border-style: solid; border-color: #e74c3c; background: #fdecea; color: #b03a2e; }
.blank-label .q-chip { cursor: default; }
.blank-box {
  flex: 1; min-width: 110px; min-height: 52px;
  border: 2px solid #e0e0e0; border-radius: 12px; background: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.5rem; font-weight: 700; letter-spacing: 2px; cursor: pointer;
}
.blank-box.active { border-color: #4361ee; background: #f0f4ff; }
.blank-box.b-correct { border-color: #2ecc71; background: #e8faf0; }
.blank-box.b-wrong { border-color: #e74c3c; background: #fdecea; }
.blank-correct-val { font-size: 0.95rem; color: #1a7a42; font-weight: 600; white-space: nowrap; }
.numpad {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
  margin-top: 14px; max-width: 360px; align-self: center; width: 100%;
}
.numpad button {
  padding: 14px; font-size: 1.5rem; font-weight: 600;
  border: 2px solid #e0e0e0; border-radius: 12px; background: #fff; cursor: pointer;
}
.numpad button:active:not(:disabled) { background: #f0f4ff; transform: scale(0.97); }
.numpad button:disabled { opacity: 0.4; cursor: default; }
.next-btn:disabled { opacity: 0.4; cursor: default; }

/* comparison（＞＜＝）與 code（甲乙丙丁）按鈕列 */
.choice-row { display: flex; gap: 10px; margin-top: 14px; justify-content: center; flex-wrap: wrap; }
.choice-btn {
  min-width: 72px; padding: 14px 18px; font-size: 1.5rem; font-weight: 700;
  border: 2px solid #e0e0e0; border-radius: 12px; background: #fff; cursor: pointer;
}
.choice-btn:active:not(:disabled) { background: #f0f4ff; transform: scale(0.97); }
.choice-btn:disabled { opacity: 0.4; cursor: default; }

/* text 自由輸入 */
.text-input {
  margin-top: 14px; width: 100%; padding: 14px; font-size: 1.3rem;
  border: 2px solid #e0e0e0; border-radius: 12px;
  -webkit-user-select: text; user-select: text;
}

/* ── 直式計算（vertical_calc）── */
.q-type.vc { background: #d97706; }
.vc-grid { display: grid; gap: 4px; justify-content: center; margin: 4px 0; --vc-cell: 48px; }
.vc-cell {
  width: var(--vc-cell); height: var(--vc-cell);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.5rem; font-weight: 700; border-radius: 8px;
}
.vc-fillable { border: 2px dashed #c4cbe0; background: #f8f9fc; }
.vc-active { border: 2px solid #4361ee; background: #f0f4ff; }
.vc-filled { border: 2px solid #2ecc71; background: #e8faf0; color: #1a7a42; }
.vc-error { animation: vc-shake 0.3s; border: 2px solid #e74c3c !important; background: #fdecea !important; }
@keyframes vc-shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
/* 算式線：加減答案列上緣；除法商列下緣＋除號直線 */
.vc-ansline { border-top: 3px solid #1a1a2e; border-radius: 0; }
.vc-divline { border-top: 3px solid #1a1a2e; border-radius: 0; }
.vc-divisor { border-right: 3px solid #1a1a2e; border-radius: 0; }
.vc-sep { border-bottom: 2px solid #888; border-radius: 0; }

.result-hint {
  margin-top: 16px; padding: 12px 16px; border-radius: 12px;
  font-size: 1.1rem; font-weight: 600; text-align: center;
}
.result-hint.correct { background: #e8faf0; color: #1a7a42; }
.result-hint.wrong { background: #fdecea; color: #b71c1c; }

.explain-card {
  margin-top: 10px; padding: 12px 16px; border-radius: 12px;
  background: #f4f6fb; color: #444; font-size: 1rem; line-height: 1.6;
  text-align: left;
}

.next-btn {
  display: block; width: 100%; margin-top: 16px; padding: 16px;
  border: none; border-radius: 12px; background: #4361ee; color: #fff;
  font-size: 1.1rem; font-weight: 600; cursor: pointer;
}
.next-btn:active { background: #3451c7; }

/* ── 題目回報 ── */
.flag-area, .skip-area { margin-top: 12px; text-align: center; }
.flag-btn, .skip-btn {
  background: none; border: none; color: #aab; font-size: 0.85rem;
  text-decoration: underline; cursor: pointer; padding: 6px 10px;
}
.flag-confirm {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 0.9rem; color: #b71c1c;
}
.flag-confirm button {
  padding: 6px 12px; border: none; border-radius: 8px;
  font-size: 0.9rem; cursor: pointer;
}
.flag-yes { border: 1px solid #e74c3c; background: #fdecea; color: #b71c1c; }
.flag-no { border: 1px solid #ccc; background: #fff; color: #666; }

/* 首頁已回報清單 */
.flagged-section { border-top: 2px solid #eee; padding-top: 16px; margin-top: 8px; }
.flagged-section summary { font-size: 0.9rem; color: #888; cursor: pointer; padding: 4px; }
.flagged-row {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  padding: 10px 14px; margin: 6px 0;
  border: 1px solid #ececec; border-radius: 10px; background: #fafbfc;
}
.flagged-text { font-size: 0.9rem; color: #555; }
.flagged-actions { display: flex; gap: 8px; margin-top: 8px; }

.backup-section { border-top: 2px solid #eee; padding-top: 16px; margin-top: 8px; }
.backup-section summary { font-size: 0.9rem; color: #888; cursor: pointer; padding: 4px; }
.backup-body { padding: 8px 4px; }
.backup-hint { font-size: 0.85rem; color: #777; margin: 6px 0 10px; line-height: 1.5; }
.backup-body > .st-btn { margin-right: 8px; }
.backup-io { margin-top: 12px; }
.backup-io textarea {
  width: 100%; box-sizing: border-box; min-height: 110px; padding: 10px;
  border: 1px solid #cdd6ff; border-radius: 8px; font-size: 0.78rem;
  font-family: ui-monospace, Menlo, Consolas, monospace; resize: vertical; color: #444;
}
.backup-actions { display: flex; gap: 8px; margin-top: 8px; align-items: center; }
.backup-actions a.st-btn { text-decoration: none; display: inline-block; }
.backup-msg { font-size: 0.85rem; color: #4361ee; margin-left: 4px; display: inline-flex; align-items: center; gap: 8px; }

/* ── 摘要頁 ── */
.summary { text-align: center; padding-top: 40px; }
.summary .score { font-size: 3rem; font-weight: 800; color: #4361ee; margin: 16px 0; }
.summary .score-label { font-size: 1.1rem; color: #666; }
.summary-btn {
  display: block; width: 100%; padding: 16px; margin-top: 12px;
  border: 2px solid #e0e0e0; border-radius: 12px; background: #fff;
  font-size: 1.05rem; font-weight: 600; cursor: pointer;
}
.summary-btn.primary { background: #4361ee; color: #fff; border-color: #4361ee; }
.summary-btn:active { transform: scale(0.98); }
/* 獎勵插畫（批末/通關/錯題清除）：實底滿版方形收藏卡、淡入 */
.reward-img {
  display: block; width: min(72vw, 400px); aspect-ratio: 1 / 1; object-fit: cover;
  margin: 16px auto; border-radius: 16px; box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  animation: rewardIn 0.3s ease-out;
}
@keyframes rewardIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
/* 完成畫面：先跳一個小獎杯，點了才揭曉插畫（拆獎品的儀式感） */
.reward-reveal { display: flex; flex-direction: column; align-items: center; gap: 4px; margin: 16px auto; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.reward-trophy {
  font-size: 76px; line-height: 1;
  animation: trophyPop 0.5s cubic-bezier(.18,.89,.32,1.28) both, trophyIdle 1.8s ease-in-out 0.7s infinite;
}
.reward-cap { font-size: 0.95rem; color: #888; }
.reward-reveal:active .reward-trophy { animation: none; transform: scale(0.92); }
.reward-reveal.revealed .reward-trophy, .reward-reveal.revealed .reward-cap { display: none; }
.reward-reveal .reward-img { margin: 0 auto; }  /* 容器已置中，圖自身不再加外距 */
@keyframes trophyPop { 0% { transform: scale(0) rotate(-18deg); opacity: 0; } 60% { transform: scale(1.18) rotate(7deg); } 100% { transform: scale(1) rotate(0); opacity: 1; } }
@keyframes trophyIdle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

/* ── 錯誤頁 ── */
.error-msg { text-align: center; padding-top: 60px; color: #888; font-size: 1.1rem; }

.hidden { display: none !important; }
</style>
</head>
<body>
<div class="container" id="app">
  <div id="page-home" class="home"></div>
  <div id="page-quiz" class="hidden"></div>
  <div id="page-summary" class="summary hidden"></div>
  <div id="page-error" class="error-msg hidden"><p>題庫載入失敗，請重新整理頁面。</p></div>
</div>

<script>
(function() {
"use strict";

// ════════════════════════════════════════════════════
// Storage
// ════════════════════════════════════════════════════
const STORAGE_KEY = "aiden_study_v2";
const OLD_KEY = "aiden_study_records";

const DEFAULT_DATA = { challenge: { "1": null, "2": null }, mastered: {}, errorBank: [], stats: {}, flagged: [], semester: "final", subject: "science" };
const DEFAULT_PRACTICE_MODE = "choice";
const HANDWRITING_PRACTICE_MODE = "handwriting";

// <chinese-mode-pure>
// ══════ 國語改錯字練習模式狀態（純函式；choice/handwriting 隔離）══════
// 注意：此區塊到 </chinese-mode-pure> 為止不得引用外部全域變數，
// 才能被 node 測試抽出獨立 eval。
function normalizePracticeMode(mode) {
  return mode === "handwriting" ? "handwriting" : "choice";
}

function modeChallengeKey(unit, subtopic = null, mode = "choice") {
  const base = subtopic ? `${unit}/${subtopic}` : String(unit);
  const m = normalizePracticeMode(mode);
  return m === "choice" ? base : `${m}:${base}`;
}

function cleanStat(s) {
  return {
    practiced: Math.max(0, Number(s && s.practiced) || 0),
    correct: Math.max(0, Number(s && s.correct) || 0),
  };
}

function statsModesFromEntry(entry) {
  const modes = {};
  if (entry && typeof entry === "object" && entry.modes && typeof entry.modes === "object") {
    for (const [mode, stat] of Object.entries(entry.modes)) {
      modes[normalizePracticeMode(mode)] = cleanStat(stat);
    }
  } else if (entry && typeof entry === "object") {
    modes.choice = cleanStat(entry);
  }
  return modes;
}

function getModeStat(stats, qId, mode = "choice") {
  const modes = statsModesFromEntry((stats || {})[qId]);
  return modes[normalizePracticeMode(mode)] || { practiced: 0, correct: 0 };
}

function hasModeStat(stats, qId, mode = "choice") {
  const modes = statsModesFromEntry((stats || {})[qId]);
  return Object.prototype.hasOwnProperty.call(modes, normalizePracticeMode(mode));
}

function recordModeAnswer(stats, qId, isCorrect, mode = "choice") {
  const next = { ...(stats || {}) };
  const modes = statsModesFromEntry(next[qId]);
  const m = normalizePracticeMode(mode);
  const cur = modes[m] || { practiced: 0, correct: 0 };
  modes[m] = { practiced: cur.practiced + 1, correct: cur.correct + (isCorrect ? 1 : 0) };
  next[qId] = { modes };
  return next;
}

function recordsToModeStats(records, mode = "choice") {
  let stats = {};
  for (const r of records || []) {
    if (r && r.questionId) stats = recordModeAnswer(stats, r.questionId, !!r.correct, mode);
  }
  return stats;
}

function modeWrongCount(stats, qId, mode = "choice") {
  const s = getModeStat(stats, qId, mode);
  return s.practiced - s.correct;
}

function errorEntryMode(e) {
  return normalizePracticeMode(e && e.mode);
}

function unitMatchesFilter(unit, unitFilter) {
  if (!unitFilter) return true;
  if (Array.isArray(unitFilter)) return unitFilter.includes(unit);
  return unit === unitFilter;
}

function filterModeErrorBank(errorBank, unitFilter = null, mode = "choice") {
  const m = normalizePracticeMode(mode);
  return (errorBank || []).filter(e => unitMatchesFilter(e.unit, unitFilter) && errorEntryMode(e) === m);
}

function addModeError(errorBank, qId, unit, mode = "choice") {
  const bank = [...(errorBank || [])];
  const m = normalizePracticeMode(mode);
  if (!bank.some(e => e.questionId === qId && errorEntryMode(e) === m)) {
    bank.push({ questionId: qId, unit, mode: m });
  }
  return bank;
}

function removeModeError(errorBank, qId, mode = "choice") {
  const m = normalizePracticeMode(mode);
  return (errorBank || []).filter(e => !(e.questionId === qId && errorEntryMode(e) === m));
}

function removeAllModeErrors(errorBank, qId) {
  return (errorBank || []).filter(e => e.questionId !== qId);
}

function shouldKeepModeError(stats, entry, choiceWrongThreshold = 2) {
  const mode = errorEntryMode(entry);
  if (mode !== "choice") return true;
  return !hasModeStat(stats, entry.questionId, mode) || modeWrongCount(stats, entry.questionId, mode) >= choiceWrongThreshold;
}

function shouldAddModeError(stats, qId, mode = "choice", choiceWrongThreshold = 2) {
  const m = normalizePracticeMode(mode);
  if (m !== "choice") return true;
  return modeWrongCount(stats, qId, m) >= choiceWrongThreshold;
}

function masteredModesFromEntry(entry) {
  const modes = {};
  if (Array.isArray(entry)) {
    modes.choice = [...new Set(entry)];
  } else if (entry && typeof entry === "object" && entry.modes && typeof entry.modes === "object") {
    for (const [mode, ids] of Object.entries(entry.modes)) {
      if (Array.isArray(ids)) modes[normalizePracticeMode(mode)] = [...new Set(ids)];
    }
  }
  return modes;
}

function masteredListForMode(mastered, unit, mode = "choice") {
  const modes = masteredModesFromEntry((mastered || {})[String(unit)]);
  return modes[normalizePracticeMode(mode)] || [];
}

function addModeMastered(mastered, unit, qId, mode = "choice") {
  const next = { ...(mastered || {}) };
  const u = String(unit);
  const modes = masteredModesFromEntry(next[u]);
  const m = normalizePracticeMode(mode);
  if (!modes[m]) modes[m] = [];
  if (!modes[m].includes(qId)) modes[m].push(qId);
  next[u] = { modes };
  return next;
}

function removeQuestionFromAllModeMastered(mastered, unit, qId) {
  const next = { ...(mastered || {}) };
  const u = String(unit);
  const modes = masteredModesFromEntry(next[u]);
  for (const m of Object.keys(modes)) modes[m] = modes[m].filter(id => id !== qId);
  next[u] = { modes };
  return next;
}
// </chinese-mode-pure>

const Storage = {
  load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return null;
      return JSON.parse(raw);
    } catch { return null; }
  },
  save(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  },
  migrate() {
    if (localStorage.getItem(STORAGE_KEY)) return; // already migrated
    try {
      const raw = localStorage.getItem(OLD_KEY);
      if (!raw) return;
      const old = JSON.parse(raw);
      const records = old.records || [];
      const stats = recordsToModeStats(records, DEFAULT_PRACTICE_MODE);
      const v2 = { ...DEFAULT_DATA, stats };
      Storage.save(v2);
      localStorage.removeItem(OLD_KEY);
    } catch { /* ignore corrupt old data */ }
  }
};

// ════════════════════════════════════════════════════
// State
// ════════════════════════════════════════════════════
let state = null;

const State = {
  init(saved) {
    state = saved ? { ...DEFAULT_DATA, ...saved } : { ...structuredClone(DEFAULT_DATA) };
    if (!state.challenge) state.challenge = { "1": null, "2": null };
    if (!state.errorBank) state.errorBank = [];
    if (!state.stats) state.stats = {};
    if (!state.semester) state.semester = "final";
    if (!state.subject) state.subject = "science";
    if (!state.mastered) state.mastered = {};
    if (!state.flagged) state.flagged = [];
    // 舊 v2 存檔沒有 mastered → 題庫載入後從既有 challenge 進度反推
    if (saved && !saved.mastered) state._needMasteredBackfill = true;
  },

  // Semester (期中/期末 切換，記住選擇)
  setSemester(s) {
    state.semester = s;
    Storage.save(state);
  },

  // Subject (自然/數學 切換，記住選擇)
  setSubject(s) {
    state.subject = s;
    Storage.save(state);
  },

  // Stats（目前只寫不讀：保留每題作答記錄，供未來功能使用）
  recordAnswer(qId, isCorrect, mode = DEFAULT_PRACTICE_MODE) {
    state.stats = recordModeAnswer(state.stats, qId, isCorrect, mode);
    Storage.save(state);
  },
  // 累計答錯次數（practiced − correct）。用來判斷是否「錯夠多次」才進錯題庫。
  wrongCount(qId, mode = DEFAULT_PRACTICE_MODE) {
    return modeWrongCount(state.stats, qId, mode);
  },

  // ErrorBank（unitFilter 可為 單一 unit、unit 陣列，或 null=全部）
  getErrorBank(unitFilter, mode = DEFAULT_PRACTICE_MODE) {
    return filterModeErrorBank(state.errorBank, unitFilter, mode);
  },
  addToErrorBank(qId, unit, mode = DEFAULT_PRACTICE_MODE) {
    state.errorBank = addModeError(state.errorBank, qId, unit, mode);
    Storage.save(state);
  },
  removeFromErrorBank(qId, mode = DEFAULT_PRACTICE_MODE) {
    state.errorBank = removeModeError(state.errorBank, qId, mode);
    Storage.save(state);
  },

  // ── Flagged（回報有問題的題目：排除於所有題池與通關分母，可從首頁還原）
  getFlagged() {
    return [...state.flagged];
  },
  isFlagged(qId) {
    return state.flagged.some(f => f.questionId === qId);
  },
  flagQuestion(qId, unit) {
    if (State.isFlagged(qId)) return;
    state.flagged.push({ questionId: qId, unit, flaggedAt: Date.now() });
    // 題目本身有疑慮 → 該題的歷史作答記錄一律視為不可信，整筆清除
    delete state.stats[qId];
    state.errorBank = removeAllModeErrors(state.errorBank, qId);
    state.mastered = removeQuestionFromAllModeMastered(state.mastered, unit, qId);
    Storage.save(state);
  },
  unflagQuestion(qId) {
    state.flagged = state.flagged.filter(f => f.questionId !== qId);
    Storage.save(state);
  },
  unflagAll() {
    state.flagged = [];
    Storage.save(state);
  },

  // 當前批次（key 為複合鍵：單元 "3" 或 單元+subtopic "3/動物分類"）
  // 新格式 { batch:[ids] }＝進行中的半批；null＝無進行中批次（下次現算新批）
  // 舊格式 { queue:[...] } 由 getBatch 視為 null（丟棄排序，進度由 mastered 保留、不倒退）
  getBatch(key) {
    const ch = state.challenge[key];
    return ch && Array.isArray(ch.batch) ? ch.batch : null;
  },
  saveBatch(key, batch) {
    state.challenge[key] = { batch: [...batch] };
    Storage.save(state);
  },
  clearBatch(key) {
    state.challenge[key] = null; // 本批完成 → 無進行中批次
    Storage.save(state);
  },
  resetChallenge(key) {
    state.challenge[key] = null; // 未開始
    Storage.save(state);
  },

  // ── Mastered（已答對題目，單一真相源；整單元與 subtopic 進度皆由此推導）
  getMasteredSet(unit, mode = DEFAULT_PRACTICE_MODE) {
    return new Set(masteredListForMode(state.mastered, unit, mode));
  },
  addMastered(unit, qId, mode = DEFAULT_PRACTICE_MODE) {
    state.mastered = addModeMastered(state.mastered, unit, qId, mode);
    Storage.save(state);
  },
  resetMastered(unit, subtopic = null, mode = null) {
    const u = String(unit);
    if (!state.mastered[u]) return;
    const modes = masteredModesFromEntry(state.mastered[u]);
    const targetModes = mode ? [normalizePracticeMode(mode)] : Object.keys(modes);
    if (targetModes.length === 0) return;
    if (subtopic) {
      for (const m of targetModes) {
        modes[m] = (modes[m] || []).filter(id => {
          const q = questionMap.get(id);
          return q && q.subtopic !== subtopic;
        });
      }
    } else {
      for (const m of targetModes) modes[m] = [];
    }
    state.mastered[u] = { modes };
    Storage.save(state);
  },
  doneCount(unit, subtopic = null, mode = DEFAULT_PRACTICE_MODE) {
    const set = State.getMasteredSet(unit, mode);
    return questionIdsFor(unit, subtopic).filter(id => set.has(id)).length;
  },
  isCleared(unit, subtopic = null, mode = DEFAULT_PRACTICE_MODE) {
    const ids = questionIdsFor(unit, subtopic);
    if (ids.length === 0) return false;
    const set = State.getMasteredSet(unit, mode);
    return ids.every(id => set.has(id));
  },
  // v2→v3 反推：每個 challenge queue 的「範圍題 \ queue」＝已答對（無損、與舊顯示等價）
  backfillMastered() {
    for (const [key, ch] of Object.entries(state.challenge || {})) {
      if (!ch || !ch.queue) continue; // null = 未開始，無貢獻
      const slash = key.indexOf("/");
      const unit = Number(slash === -1 ? key : key.slice(0, slash));
      const subtopic = slash === -1 ? null : key.slice(slash + 1);
      if (!unit) continue;
      const remaining = new Set(ch.queue);
      for (const id of questionIdsFor(unit, subtopic)) {
        if (!remaining.has(id)) state.mastered = addModeMastered(state.mastered, unit, id, DEFAULT_PRACTICE_MODE);
      }
    }
    delete state._needMasteredBackfill;
    Storage.save(state);
  }
};

// challenge 複合鍵：choice 沿用舊鍵；handwriting 用前綴，避免批次狀態互撞
function challengeKey(unit, subtopic, mode = DEFAULT_PRACTICE_MODE) {
  return modeChallengeKey(unit, subtopic, mode);
}

// 取某單元（可選 subtopic）的題目 id；flagged 題排除（題池與通關分母的共同入口）
function questionIdsFor(unit, subtopic) {
  return allQuestions
    .filter(q => q.unit === unit && (!subtopic || q.subtopic === subtopic) && !State.isFlagged(q.id))
    .map(q => q.id);
}

  chineseChoices: null
};

// Utilities
// ════════════════════════════════════════════════════
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// 批大小：剩 N 題時平均拆——最少要 k=ceil(N/max) 批，每批 ceil(N/k) 題，無零頭尾巴。
// 邊界：N≤0→0、N≤max→N。每開新批依「當下剩餘」現算，不預先固定整單元批表。
function nextBatchSize(remaining, max = 10) {
  if (remaining <= 0) return 0;
  if (remaining <= max) return remaining;
  const k = Math.ceil(remaining / max);
  return Math.ceil(remaining / k);
}

function showPage(id) {
  _rewardGen++;   // 任何換頁都作廢「載入中的 reward 預載 callback」，避免它稍後把使用者硬拉回 summary
  document.querySelectorAll("#app > div").forEach(el => el.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
  window.scrollTo(0, 0);
}

function resetQuestionRuntime() {
  quiz.activeQuestionId = null;
  quiz.chineseStage = "find";
  quiz.chinesePickedIndex = null;

}

function getAudioContext() {
  const AudioContextCtor = window.AudioContext || window.webkitAudioContext;
  if (!AudioContextCtor) return null;
  if (!audioCtx) audioCtx = new AudioContextCtor();
  if (audioCtx.state === "suspended") {
    const resume = audioCtx.resume();
    if (resume && typeof resume.catch === "function") resume.catch(() => {});
  }
  return audioCtx;
}

function playTone(ctx, start, freq, duration, options = {}) {
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = options.type || "sine";
  osc.frequency.setValueAtTime(freq, start);
  gain.gain.setValueAtTime(0.0001, start);
  gain.gain.exponentialRampToValueAtTime(options.volume || 0.2, start + 0.018);
  gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(start);
  osc.stop(start + duration + 0.03);
}

function playSound(name) {
  try {
    const ctx = getAudioContext();
    const pattern = SOUND_PATTERNS[name];
    if (!ctx || !pattern) return;
    const start = ctx.currentTime + 0.01;
    for (const [offset, freq, duration, opts] of pattern) {
      playTone(ctx, start + offset, freq, duration, opts);
    }
  } catch {
    // 音效只是情緒回饋；瀏覽器若擋播放，答題流程照常。
  }
}

// Picker
// ════════════════════════════════════════════════════
const Picker = {
  // 全部練習：取一「批」（上限 10）。有未完成半批則接續，否則從剩餘未答對題現算新批。
  nextBatch(unit, subtopic, practiceMode = DEFAULT_PRACTICE_MODE) {
    const mastered = State.getMasteredSet(unit, practiceMode);
    // 剩餘未答對題（整單元/subtopic 題 − mastered；flagged 已由 questionIdsFor 排除）
    const remaining = questionIdsFor(unit, subtopic).filter(id => !mastered.has(id) && questionMap.has(id));
    const saved = State.getBatch(challengeKey(unit, subtopic, practiceMode)); // 半批 ids 或 null
    if (saved && saved.length) {
      const cont = saved.filter(id => remaining.includes(id));  // 仍未答對且仍在題庫
      if (cont.length) return cont;                             // 接續半批（中途被打斷）
    }
    const shuffled = shuffle(remaining);
    return shuffled.slice(0, nextBatchSize(shuffled.length));   // 開新批
  },

  forErrorPractice(unitFilter, practiceMode = DEFAULT_PRACTICE_MODE) {
    const errors = State.getErrorBank(unitFilter || null, practiceMode);
    const ids = errors.map(e => e.questionId).filter(id => questionMap.has(id));
    return shuffle(ids);
  }
};

// Quiz Engine
// ════════════════════════════════════════════════════
function startQuiz(mode, unit, subtopic = null, practiceMode = DEFAULT_PRACTICE_MODE) {
  quiz.mode = mode;
  quiz.practiceMode = normalizePracticeMode(practiceMode);
  quiz.unit = unit;
  quiz.subtopic = subtopic;
  quiz.answered = [];
  quiz.isAnswered = false;
  resetQuestionRuntime();

  if (mode === "full") {
    quiz.queue = Picker.nextBatch(unit, subtopic, quiz.practiceMode);
    quiz.batchIds = [...new Set(quiz.queue)];                       // 本批相異題（進度條分母）
    quiz.totalForProgress = questionIdsFor(unit, subtopic).length;  // 整單元數（僅防禦用）
    State.saveBatch(challengeKey(unit, subtopic, quiz.practiceMode), quiz.queue);
  } else if (mode === "error") {
    quiz.queue = Picker.forErrorPractice(unit, quiz.practiceMode);
    quiz.totalForProgress = quiz.queue.length;
  }

  showPage("page-quiz");
  renderQuiz();
}

function getCurrentQuestion() {
  // full & error: always queue[0]
  return questionMap.get(quiz.queue[0]);
}

function submitAnswer(selected) {
  if (quiz.isAnswered) return;
  quiz.isAnswered = true;

  const q = getCurrentQuestion();
  let correct;
  if (q.type === "fill_in_blank") {
    quiz._fillResults = q.blanks.map((b, i) => isBlankCorrect(b, selected[i]));
    correct = quiz._fillResults.every(Boolean);   // 多空格全對才算對
  } else if (q.type === "vertical_calc") {
    correct = selected.vcErrors === 0;            // 逐格即時驗證：零失誤才算對
  } else {
    correct = selected === q.answer;
  }

  // Update stats (all modes)
  State.recordAnswer(q.id, correct, quiz.practiceMode);

  // Mode-specific queue logic
  if (quiz.mode === "full") {
    quiz.queue.shift();
    if (correct) {
      State.addMastered(quiz.unit, q.id, quiz.practiceMode); // 雙向共享：整單元與 subtopic 進度同步計入
    } else {
      quiz.queue.push(q.id);
      // 只有「累計答錯 ≥ 2 次」才進錯題庫：一次粗心、同批內馬上自己改對的不算，
      // 錯題庫＝真正需要加強的題。recordAnswer 已先累加，wrongCount 已含本次。
      if (shouldAddModeError(state.stats, q.id, quiz.practiceMode)) State.addToErrorBank(q.id, q.unit, quiz.practiceMode);
    }
    State.saveBatch(challengeKey(quiz.unit, quiz.subtopic, quiz.practiceMode), quiz.queue);
  } else if (quiz.mode === "error") {
    quiz.queue.shift();
    if (correct) {
      State.removeFromErrorBank(q.id, quiz.practiceMode);
    } else {
      quiz.queue.push(q.id);
    }
  }

  quiz.answered.push({ questionId: q.id, correct });
  renderFeedback(correct, q);
}

function advance() {
  quiz.isAnswered = false;
  resetQuestionRuntime();

  // Check if finished
  if (quiz.mode === "full" && quiz.queue.length === 0) {
    finishBatch();
    return;
  }
  if (quiz.mode === "error" && quiz.queue.length === 0) {
    renderSummary();
    return;
  }

  renderQuiz();
}

// 本批做完：先判整單元清空（→「通關！」），否則進「批間畫面」。
// 順序不可反——整單元 ≤10 題只一批時，答完要直接通關、不出現批間畫面。
function finishBatch() {
  State.clearBatch(challengeKey(quiz.unit, quiz.subtopic, quiz.practiceMode));
  if (State.isCleared(quiz.unit, quiz.subtopic, quiz.practiceMode)) renderSummary();
  else renderBatchBreak();
}

// 跳過（只限全部模式、作答前）：移出本輪 queue，不動統計／錯題庫／mastered。
// 沒進 mastered → 不算通關，下次接續或重練時會再出現
function skipCurrentQuestion() {
  if (quiz.mode !== "full" || quiz.isAnswered) return;
  const id = quiz.queue[0];
  quiz.queue.shift();
  quiz.batchIds = quiz.batchIds.filter(x => x !== id); // 本批分母 −1；被跳過題之後別批會再出現
  State.saveBatch(challengeKey(quiz.unit, quiz.subtopic, quiz.practiceMode), quiz.queue);
  resetQuestionRuntime();
  if (quiz.queue.length === 0) { finishBatch(); return; }
  renderQuiz();
}

// 確認回報：清除該題記錄、從本輪 queue 抽掉、直接進下一題
function flagCurrentQuestion() {
  // flag 對象是「剛作答的題」：full/error 模式 submitAnswer 已 shift queue，
  // 此時 getCurrentQuestion() 指向下一題，必須改從作答記錄取
  const last = quiz.answered[quiz.answered.length - 1];
  const q = last && questionMap.get(last.questionId);
  if (!q) return;
  State.flagQuestion(q.id, q.unit);

  // 撤銷本題剛剛的作答（進度點與總結不計入）
  quiz.answered.pop();

  quiz.isAnswered = false;
  resetQuestionRuntime();
  if (quiz.mode === "full") {
    quiz.queue = quiz.queue.filter(id => id !== q.id);
    quiz.batchIds = quiz.batchIds.filter(id => id !== q.id); // 本批分母 −1；該題永久排除於所有題池
    State.saveBatch(challengeKey(quiz.unit, quiz.subtopic, quiz.practiceMode), quiz.queue);
    if (quiz.queue.length === 0) { finishBatch(); return; }
  } else if (quiz.mode === "error") {
    quiz.queue = quiz.queue.filter(id => id !== q.id);
    quiz.totalForProgress--;
    if (quiz.queue.length === 0) { renderSummary(); return; }
  }
  renderQuiz();
}

function leaveQuiz() {
  // Full mode: queue already saved on each answer
  showPage("page-home");
  renderHome();
}

// <backup-pure>
// ══════ 備份格式契約（純函式；issue #8，與還原側 #9 共用）══════
// 改這裡會同時牽動備份與還原，務必連 tests/test_backup_pure.mjs 一起跑（node --test）。
// 注意：此區塊到 </backup-pure> 為止不得引用外部全域變數（如 state/STORAGE_KEY），
// 才能被 node 測試抽出獨立 eval。
const BACKUP_MARKER = "AIDEN備份";

// state 物件或 JSON 字串（＋時間）→ 備忘錄文字：首行＝標題＝記號＋timecode，其後為原始可讀 JSON。
function buildBackupText(stateOrJson, date = new Date()) {
  const jsonStr = typeof stateOrJson === "string" ? stateOrJson : JSON.stringify(stateOrJson);
  const p = n => String(n).padStart(2, "0");
  const ts = `${date.getFullYear()}-${p(date.getMonth() + 1)}-${p(date.getDate())} ` +
             `${p(date.getHours())}:${p(date.getMinutes())}`;
  return `${BACKUP_MARKER} ${ts}\n${jsonStr}`;
}

// 內文裡「最後一段」備份的記號起始位置（行首的記號）；無記號回 -1。
// 為何：分享到「既有筆記」會把新備份附加在後 → 一則筆記可能累積多段，還原一律取最新那段。
// 只認行首記號，避免命中 JSON 值裡剛好含 "AIDEN備份" 的字串。
function lastBackupBlockStart(text) {
  let mark = -1, pos = text.indexOf(BACKUP_MARKER);
  while (pos !== -1) {
    if (pos === 0 || text[pos - 1] === "\n") mark = pos;
    pos = text.indexOf(BACKUP_MARKER, pos + 1);
  }
  return mark;
}

// 備份文字（可帶或不帶記號首行；可能累積多段）→ 取最後一段 → 驗證形狀 → 物件或 null。
// 形狀檢查＝沿用匯入既有規則：物件且含 mastered 或 challenge（舊版備份可能無 mastered，靠 backfill 還原）。
function parseBackup(text) {
  if (typeof text !== "string") return null;
  let body = text.trim();
  const mark = lastBackupBlockStart(body);
  if (mark !== -1) {
    const after = body.slice(mark);              // "AIDEN備份 …\n{json}"
    const nl = after.indexOf("\n");
    body = nl !== -1 ? after.slice(nl + 1).trim() : after;
  }
  let obj;
  try { obj = JSON.parse(body); } catch (e) { return null; }
  if (!obj || typeof obj !== "object" || Array.isArray(obj) || !(obj.mastered || obj.challenge)) return null;
  return obj;
}

// 文字 ↔ URL-safe base64（UTF-8 safe；中文不炸）。供 #9 的 #restore= 與捷徑 deep link 搬運用。
function encodeBackup(text) {
  let bin = "";
  for (const b of new TextEncoder().encode(text)) bin += String.fromCharCode(b);
  return btoa(bin).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}
function decodeBackup(b64) {
  let s = String(b64).replace(/-/g, "+").replace(/_/g, "/");
  while (s.length % 4) s += "=";
  const bytes = Uint8Array.from(atob(s), c => c.charCodeAt(0));
  return new TextDecoder().decode(bytes);
}

// 捷徑名 → shortcuts:// 深連結（喚起指定捷徑）。中文名需 percent-encode。
function buildShortcutDeepLink(name) {
  return `shortcuts://run-shortcut?name=${encodeURIComponent(name)}`;
}

// 內文「最後一段」備份的記號行 → 回傳其 timecode（"2026-06-15 14:30"），否則 null。供還原確認顯示日期。
// 取最後一段：與 parseBackup 一致（多段累積時顯示的是真正會還原的那份日期）。
function backupLabel(text) {
  if (typeof text !== "string") return null;
  const mark = lastBackupBlockStart(text);
  if (mark === -1) return null;
  const first = text.slice(mark).split("\n")[0].trim();
  return first.slice(BACKUP_MARKER.length).trim() || null;
}

// location.hash（#restore=<base64>）→ { obj, label } 或 null（無 restore 參數／解碼失敗／形狀不符）。
function readRestoreHash(hash) {
  if (typeof hash !== "string") return null;
  const m = hash.match(/[#&]?restore=([^&]+)/);
  if (!m) return null;
  let text;
  try { text = decodeBackup(m[1]); } catch (e) { return null; }
  const obj = parseBackup(text);
  if (!obj) return null;
  return { obj, label: backupLabel(text) };
}

// 長度防護：保守上限（字元）。超過 → 提示備份太大、捷徑/網址還原可能塞不下（真機校準閾值留 #11）。
const BACKUP_SIZE_WARN = 40000;
function isBackupOversized(text, max = BACKUP_SIZE_WARN) {
  return typeof text === "string" && text.length > max;
}
// </backup-pure>

// 捷徑名稱：與家長在 Shortcuts 建立的還原捷徑名稱必須一字不差（深連結寫死；#10 配方文件須標註此耦合）。
const SHORTCUT_NAME = "Aiden還原";

// ── 進度備份／還原（純前端；備份的就是 localStorage 那份存檔）
window._exportProgress = () => {
  const json = localStorage.getItem(STORAGE_KEY) || JSON.stringify(state);
  const d = new Date();
  const stamp = `${d.getFullYear()}${String(d.getMonth() + 1).padStart(2, "0")}${String(d.getDate()).padStart(2, "0")}`;
  const box = document.getElementById("backup-io");
  box.classList.remove("hidden");
  box.innerHTML = `
    <p class="backup-hint">這是目前的進度。複製起來貼到備忘錄／Email 給自己，或下載存檔：</p>
    <textarea id="backup-text" readonly></textarea>
    <div class="backup-actions">
      <button class="st-btn" id="backup-copy">複製</button>
      <a class="st-btn" id="backup-dl" download="aiden-study-進度備份-${stamp}.json">下載檔案</a>
      <span id="backup-msg" class="backup-msg"></span>
    </div>`;
  const ta = document.getElementById("backup-text");
  ta.value = json; // 用 .value 設定，避開 HTML escape 問題
  document.getElementById("backup-dl").href =
    URL.createObjectURL(new Blob([json], { type: "application/json" }));
  document.getElementById("backup-copy").onclick = async () => {
    ta.focus(); ta.select();
    let ok = false;
    try { await navigator.clipboard.writeText(json); ok = true; }
    catch (e) { try { ok = document.execCommand("copy"); } catch (e2) {} }
    document.getElementById("backup-msg").textContent = ok ? "已複製！" : "請長按上面文字手動複製";
  };
};

// 備份到備忘錄：叫出系統分享選單（內容＝記號＋timecode＋原始 JSON），家長點「備忘錄」即存成一則有日期筆記。
// 不支援 navigator.share（多為桌面瀏覽器）→ 退回現有複製/下載面板。
window._shareBackup = async () => {
  if (!state) return;  // 進度尚未載入，別備份出空資料
  const json = localStorage.getItem(STORAGE_KEY) || JSON.stringify(state);
  const text = buildBackupText(json);
  if (isBackupOversized(text)) _warnBackupOversized();  // 非阻擋：仍照常分享，但提醒捷徑還原可能塞不下
  let shareFailed = false;  // 區分「裝置不支援」與「支援但這次失敗」，退回文案才不誤導
  if (navigator.share) {
    try { await navigator.share({ title: "Aiden 進度備份", text }); return; }
    catch (e) {
      if (e && e.name === "AbortError") return;  // 使用者取消分享，不退回、不算失敗
      shareFailed = true;                        // 支援 share 但這次 reject（非取消）
    }
  }
  window._exportProgress();  // 不支援或分享失敗 → 退回複製/下載

}

// 避免把不可信文字（如備份 label，來源是任意 #restore= 連結）直接塞 innerHTML → XSS
function escapeHtml(s) {
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

// 載入時若帶 #restore=<base64>（還原捷徑帶回）→ 二次確認顯示日期後覆蓋；失敗則清掉壞 hash 並提示。
function handleRestoreHash() {
  if (!location.hash || location.hash.indexOf("restore=") === -1) return;
  const cleanUrl = location.pathname + location.search;  // 去掉 hash 的乾淨網址
  const res = readRestoreHash(location.hash);
  // 捷徑可能在做題中途用 Open URL 帶 hash 進來 → 先回首頁，備份區 DOM 才在、確認/錯誤才看得到
  showPage("page-home");
  renderHome();
  const det = document.querySelector("details.backup-section");
  if (det) det.open = true;
  const box = document.getElementById("backup-io");
  if (!box) { history.replaceState(null, "", cleanUrl); return; }  // 極端：無處呈現，至少清掉 hash
  box.classList.remove("hidden");
  if (!res) {
    history.replaceState(null, "", cleanUrl);  // 壞 hash：清掉、不 reload
    box.innerHTML = `<p class="backup-hint">這個還原連結看不懂或已損壞，沒有還原。請改用「匯入進度」貼上備份。</p>`;
    return;
  }
  const when = res.label ? `（${escapeHtml(res.label)} 的備份）` : "";
  box.innerHTML = `
    <p class="backup-hint">要用備忘錄這份${when}覆蓋目前進度嗎？<b>覆蓋後不可復原</b>。</p>
    <div class="backup-actions">
      <button class="st-btn" id="restore-confirm">確定還原</button>
      <button class="st-btn" id="restore-cancel">取消</button>
    </div>`;
  document.getElementById("restore-confirm").onclick = () => {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(res.obj));
    location.replace(cleanUrl);  // reload 並去掉 hash（不留歷史，避免重觸發）
  };
  document.getElementById("restore-cancel").onclick = () => {
    history.replaceState(null, "", cleanUrl);
    box.innerHTML = `<p class="backup-hint">已取消還原。</p>`;
  };
  if (det) det.scrollIntoView({ behavior: "smooth" });
}

// 回報到 GitHub：prefill issue URL（零後端；pad 瀏覽器需登入過 GitHub）
const ISSUE_URL = "https://github.com/huansbox/aiden-study/issues/new";
const ISSUE_URL_MAX = 7000; // 瀏覽器/GitHub 對 URL 長度的安全上限

function formatAnswer(q) {
  if (q.type === "true_false") return q.answer === "true" ? "O（正確）" : "X（錯誤）";
  if (q.type === "chinese_correction") return `「${q.wrong}」改成「${q.answer}」`;
  if (q.type === "fill_in_blank") {
    return q.blanks.map((b, i) => `（${i + 1}）${COMPARE_DISPLAY[b.answer] || b.answer}`).join("　");
  }
  if (q.type === "vertical_calc") {
    return q.op === "long_division"
      ? `商 ${q.answer.quotient}、餘數 ${q.answer.remainder}`
      : String(q.answer);
  }
  return `選項 ${q.answer}`;
}

function buildReportUrl() {
  const qs = State.getFlagged().map(f => questionMap.get(f.questionId)).filter(Boolean);
  const today = new Date().toISOString().slice(0, 10);
  const title = `題目回報：${qs.length} 題（${today}）`;

  const full = qs.map(q => {
    let s = `### ${q.id}\n`;
    s += `- 單元：第 ${unitNum(q.unit)} 單元／${q.subtopic}\n`;
    s += `- 題目：${q.text}\n`;
    const opts = q.options || q.choices || [];
    if (opts.length > 0) {
      s += `- 選項：${opts.map((o, i) => `(${i + 1}) ${o}`).join("　")}\n`;
    }
    s += `- 現存答案：${formatAnswer(q)}\n`;
    s += `- 來源：${q.source}`;
    return s;
  }).join("\n\n");
  const compact = qs.map(q => `- ${q.id}：${q.text.slice(0, 40)}`).join("\n");
  const idsOnly = qs.map(q => `- ${q.id}`).join("\n");

  // 題數多時逐級降格，避免超出 URL 長度上限
  for (const body of [full, compact, idsOnly]) {
    const url = `${ISSUE_URL}?title=${encodeURIComponent(title)}&body=${encodeURIComponent(body)}`;
    if (url.length <= ISSUE_URL_MAX) return url;
  }
  return `${ISSUE_URL}?title=${encodeURIComponent(title)}`;
}

window._reportToGitHub = () => { window.open(buildReportUrl(), "_blank"); };

// <enum-break-pure>
// ══════ 題幹列舉條列換行（純函式；待辦⑤，做法 B）══════
// 在「已切選項後」的題幹裡遇 CJK 序數列舉標記（括號式（甲）/(甲)、裸式 甲. 甲： 甲、），
// 於標記前插 <br>，讓並列項分行。純顯示、不動題庫。改這裡連 tests/test_breaks_pure.mjs 跑（node --test）。
// 注意：此區塊到 </enum-break-pure> 為止不得引用外部全域變數，才能被 node 測試抽出獨立 eval。
function applyEnumBreaks(stem) {
  if (typeof stem !== "string") return stem;
  // 標記＝括號包單一序數，或序數緊接定界符（. ． ： : 、）。只認 CJK 天干，不收數字/拉丁/羅馬。
  const MARK = /[（(][甲乙丙丁戊己庚辛壬癸][）)]|[甲乙丙丁戊己庚辛壬癸][.．：:、]/g;
  const ms = [...stem.matchAll(MARK)];
  if (ms.length < 2) return stem;
  // 只斷「後面有實質內容」的標記（標記後到下個標記前須有非空白字）。
  // 這條把「用甲、乙、丙三個容器」這種句中代號指稱（標記互相緊鄰、無內容）整題排除。
  const breakAt = [];
  for (let i = 0; i < ms.length; i++) {
    const end = ms[i].index + ms[i][0].length;
    const next = i + 1 < ms.length ? ms[i + 1].index : stem.length;
    if (stem.slice(end, next).trim().length > 0) breakAt.push(ms[i].index);
  }
  if (breakAt.length < 2) return stem;          // 至少兩個帶內容的項才算列舉
  let out = stem;                                // 由後往前插，避免位移
  for (let i = breakAt.length - 1; i >= 0; i--)
    out = out.slice(0, breakAt[i]) + "<br>" + out.slice(breakAt[i]);
  return out.replace(/(<br>){2,}/g, "<br>").replace(/^<br>/, "");
}
// </enum-break-pure>

// UI: Quiz

function isCjkChar(ch) {
  return /^[\u3400-\u9fff\uf900-\ufaff]$/.test(ch);
}

function renderChineseSentence(q) {
  const interactive = quiz.chineseStage === "find";
  return `<div class="chinese-sentence">${[...q.text].map((ch, i) => {
    if (isCjkChar(ch)) {
      const cls = ["chinese-char"];
      if (quiz.chineseStage === "choose" && i === quiz.chinesePickedIndex) cls.push("picked");
      return `<button type="button" class="${cls.join(" ")}" data-idx="${i}" data-char="${escapeHtml(ch)}"${interactive ? "" : " disabled"}>${escapeHtml(ch)}</button>`;
    }
    if (/\s/.test(ch)) return " ";
    return `<span class="chinese-punct">${escapeHtml(ch)}</span>`;
  }).join("")}</div>`;
}

function bindChineseEvents(q) {
  if (quiz.chineseStage === "choose") {
    document.querySelectorAll("#q-options .opt-btn").forEach(btn => {
      btn.onclick = () => submitAnswer(btn.dataset.value);
    });
    return;
  }

  const hint = document.getElementById("chinese-hint");
  document.querySelectorAll(".chinese-char").forEach(btn => {
    btn.onclick = () => {
      if (quiz.isAnswered) return;
      const idx = Number(btn.dataset.idx);
      const ch = btn.dataset.char;
      if (ch === q.wrong) {
        quiz.chineseStage = "choose";
        quiz.chinesePickedIndex = idx;
        quiz.chineseChoices = shuffle(q.choices || []);
        renderQuiz();
        return;
      }
      btn.classList.remove("miss");
      void btn.offsetWidth;
      btn.classList.add("miss");
      if (hint) {
        hint.textContent = "這個字沒錯，再找找看";
        hint.classList.remove("hidden");
      }
    };
  });
}

function renderQuiz() {
  const q = getCurrentQuestion();
  if (!q) { leaveQuiz(); return; }

  if (quiz.activeQuestionId !== q.id) {
    quiz.activeQuestionId = q.id;
    quiz.chineseStage = "find";
    quiz.chinesePickedIndex = null;
    quiz.chineseChoices = null;
  }

  // Mode label
  let modeText = "";
  const scopeText = `第${unitNum(quiz.unit)}單元${quiz.subtopic ? "／" + quiz.subtopic : ""}`;
  if (quiz.mode === "full") modeText = `全部練習 — ${scopeText}`;
  else {
    const eu = quiz.unit;  // error 模式：unit 為單元陣列
    if (Array.isArray(eu) && eu.length === 1) modeText = `錯題練習 — 第${unitNum(eu[0])}單元`;
    else if (Array.isArray(eu) && eu.length > 1) modeText = "錯題練習 — 本學期全部";
    else modeText = "錯題練習 — 全部";
  }

  // Progress
  const progressHtml = renderProgress();

  // Question type
  const isTF = q.type === "true_false";
  const isFill = q.type === "fill_in_blank";
  const isVc = q.type === "vertical_calc";
  const isChinese = q.type === "chinese_correction";
  let typeClass = "q-type", typeLabel = "選擇題";
  if (isTF) { typeClass += " tf"; typeLabel = "是非題"; }
  else if (isFill) { typeClass += " fib"; typeLabel = "填充題"; }
  else if (isVc) { typeClass += " vc"; typeLabel = "直式計算"; }
  else if (isChinese) { typeClass += " chinese"; typeLabel = quiz.chineseStage === "choose" ? "改錯字：選正確字" : "改錯字"; }

  // Question text: remove option markers for MC
  let displayText = q.text;
  if (!isTF && !isFill && !isVc && !isChinese && q.options.length > 0) {
    const optStart = displayText.search(/[○①]\s*[1-5１-５]?/);
    if (optStart > 0) displayText = displayText.substring(0, optStart).trim();
  }
  // 列舉條列換行（選擇/是非題；MC 已切選項，故答案串①甲乙丁不在 displayText 內。填充在下方自有分支處理）
  if (!isFill && !isVc && !isChinese) displayText = applyEnumBreaks(displayText);

  // Answer area（依題型）
  let answerHtml;
  if (isVc) {
    answerHtml = `
      <div class="vc-grid" id="vc-grid"></div>
      <div id="fill-input-panel"></div>`;
  } else if (isChinese) {
    displayText = renderChineseSentence(q);
    if (quiz.chineseStage === "choose") {
      const choices = quiz.chineseChoices || q.choices || [];
      const optionsHtml = choices.map((choice, i) =>
        `<button class="opt-btn" data-value="${escapeHtml(choice)}">
          <span class="opt-label">${i + 1}</span><span>${escapeHtml(choice)}</span>
        </button>`
      ).join("");
      answerHtml = `<div class="options" id="q-options">${optionsHtml}</div>`;
    } else {
      answerHtml = `<div class="chinese-inline-hint hidden" id="chinese-hint"></div>`;
    }
  } else if (isFill) {
    quiz._fillValues = q.blanks.map(() => "");
    quiz._fillActive = 0;
    const FW = "１２３４５６７８９";
    // 條列換行（純顯示，資料不動）：分號後、(N) 子題前、甲乙丙丁列舉前、答案槽標籤前。
    // 只套填充題——選擇題的 (N) 命中多為萃取欄位滲漏雜訊，套了會放大雜訊
    displayText = displayText.replace(/；\s*/g, "；<br>");
    if ((displayText.match(/\([1-9]\)/g) || []).length >= 2)
      displayText = displayText.replace(/\s*(\([1-9]\))/g, "<br>$1");
    if ((displayText.match(/[甲乙丙丁戊]：/g) || []).length >= 2)
      displayText = displayText.replace(/\s*([甲乙丙丁戊]：)/g, "<br>$1");
    displayText = displayText.replace(/\s*((?:答|最大|最小)：)/g, "<br>$1");
    displayText = displayText.replace(/^(<br>)+/, "");
    // 補括號式 (甲)/句點式 甲. 列舉（上方只處理 ；/(N)/甲：；相鄰 <br> 由 applyEnumBreaks 收尾收合）
    displayText = applyEnumBreaks(displayText);
    // 題幹（Ｎ）標記 → chip（只認全形括號＋全形數字；半形 (1) 是原卷子題編號，不動）
    displayText = displayText.replace(/（([１-９])）/g, (m, d) => {
      const idx = FW.indexOf(d);
      return idx >= 0 && idx < q.blanks.length
        ? `<span class="q-chip${idx === 0 ? " active" : ""}" data-chip="${idx}">${d}</span>` : m;
    });
    const blanksHtml = q.blanks.map((b, i) => `
      <div class="blank-row">
        <span class="blank-label"><span class="q-chip${i === 0 ? " active" : ""}" data-chip-row="${i}">${FW[i]}</span></span>
        <div class="blank-box${i === 0 ? " active" : ""}" data-idx="${i}"></div>
      </div>`).join("");
    answerHtml = `
      <div class="blank-list" id="blank-list">${blanksHtml}</div>
      <div id="fill-input-panel"></div>
      <button class="next-btn" id="fib-submit" disabled>確認答案</button>`;
  } else {
    let options;
    if (isTF) {
      options = [
        { label: "O", value: "true", text: "正確" },
        { label: "X", value: "false", text: "錯誤" },
      ];
    } else {
      options = (q.options.length > 0 ? q.options : []).map((opt, i) => ({
        label: String(i + 1), value: String(i + 1), text: opt,
      }));
    }
    const optionsHtml = options.map(opt =>
      `<button class="opt-btn" data-value="${opt.value}">
        <span class="opt-label">${opt.label}</span><span>${opt.text}</span>
      </button>`
    ).join("");
    answerHtml = `<div class="options" id="q-options">${optionsHtml}</div>`;
  }

  document.getElementById("page-quiz").innerHTML = `
    <div class="quiz-header">
      <button class="leave-btn" id="btn-leave">&larr; 離開</button>
      <span class="mode-label">${modeText}</span>
    </div>
    ${progressHtml}
    <div class="question-card">
      <span class="${typeClass}">${typeLabel}</span>
      ${q.image ? `<img class="q-image" src="${q.image}" alt="題目附表">` : ""}
      <div class="q-text">${displayText}</div>
      ${answerHtml}
      <div class="result-hint hidden" id="result-hint"></div>
      <div class="explain-card hidden" id="explain-card"></div>
      <button class="next-btn hidden" id="next-btn">下一題</button>
      <div class="flag-area hidden" id="flag-area">
        <button class="flag-btn" id="flag-btn">題目有問題</button>
        <span class="flag-confirm hidden" id="flag-confirm">
          此題將不再出現
          <button class="flag-yes" id="flag-yes">確定回報</button>
          <button class="flag-no" id="flag-no">取消</button>
        </span>
      </div>
      ${quiz.mode === "full" ? `
      <div class="skip-area" id="skip-area">
        <button class="skip-btn" id="skip-btn">先跳過這題</button>
      </div>` : ""}
    </div>`;

  // Bind events
  document.getElementById("btn-leave").onclick = leaveQuiz;
  const skipBtn = document.getElementById("skip-btn");
  if (skipBtn) skipBtn.onclick = skipCurrentQuestion;
  if (isVc) {
    bindVcEvents(q);
  } else if (isFill) {
    bindFillEvents(q);
  } else if (isChinese) {
    bindChineseEvents(q);
  } else {
    document.querySelectorAll("#q-options .opt-btn").forEach(btn => {
      btn.onclick = () => submitAnswer(btn.dataset.value);
    });
  }
}

// ════════════════════════════════════════════════════
// 直式計算引擎（vertical_calc）
// 長除法逐格邏輯移植自 aiden-math js/division.js（內聯改寫，行為一致：
// 含前導零商位、每回合 商→乘積→落位 順序填）；小數加減直式為新寫。
// ════════════════════════════════════════════════════
function vcCalculateSteps(dividend, divisor) {
  const digits = String(dividend).split("").map(Number);
  const rounds = [];
  let carry = 0;
  for (let i = 0; i < digits.length; i++) {
    const currentNumber = carry * 10 + digits[i];
    const quotientDigit = Math.floor(currentNumber / divisor);
    const product = quotientDigit * divisor;
    const subtractResult = currentNumber - product;
    rounds.push({ currentNumber, quotientDigit, product, subtractResult });
    carry = subtractResult;
  }
  return { rounds };
}

function vcDivisionLayout(dividend, divisor) {
  const steps = vcCalculateSteps(dividend, divisor);
  const dDigits = String(dividend).split("");
  const cells = [];
  let order = 0;
  cells.push({ row: 1, col: 0, value: String(divisor), type: "divisor", fillable: false });
  dDigits.forEach((d, i) =>
    cells.push({ row: 1, col: i + 1, value: d, type: "dividend", fillable: false }));
  for (let r = 0; r < steps.rounds.length; r++) {
    const round = steps.rounds[r];
    const colStart = r + 1;
    cells.push({ row: 0, col: colStart, value: String(round.quotientDigit),
                 type: "quotient", fillable: true, order: order++ });
    const refLen = String(round.currentNumber).length;
    const pDigits = String(round.product).padStart(refLen, "0").split("");
    pDigits.forEach((d, i) =>
      cells.push({ row: 2 + r * 2, col: colStart + i - (pDigits.length - 1), value: d,
                   type: "product", fillable: true, order: order++ }));
    if (r < steps.rounds.length - 1) {
      // 減的結果＋落下一位
      const nextDigit = dDigits[r + 1];
      const subDigits = round.subtractResult === 0
        ? ["0", nextDigit]
        : [...String(round.subtractResult).split(""), nextDigit];
      subDigits.forEach((d, i) =>
        cells.push({ row: 3 + r * 2, col: colStart + i - (subDigits.length - 1) + 1, value: d,
                     type: "subtract", fillable: true, order: order++ }));
    } else {
      const rDigits = String(round.subtractResult).padStart(refLen, "0").split("");
      rDigits.forEach((d, i) =>
        cells.push({ row: 3 + r * 2, col: colStart + i - (rDigits.length - 1), value: d,
                     type: "subtract", fillable: true, order: order++ }));
    }
  }
  return { cells, totalCols: 1 + dDigits.length, kind: "division" };
}

function vcAddSubLayout(a, b, isAdd) {
  const dec = (x) => (String(x).split(".")[1] || "").length;
  const dw = Math.max(dec(a), dec(b));
  const ansNum = isAdd ? a + b : a - b;
  const ansStr = dw > 0 ? ansNum.toFixed(dw) : String(Math.round(ansNum));
  const strs = [String(a), String(b), ansStr];
  const intW = Math.max(...strs.map(s => s.split(".")[0].length));
  const cells = [];
  const placeNum = (s, row, fillable) => {
    const [ip, fp = ""] = s.split(".");
    for (let i = 0; i < ip.length; i++) {
      cells.push({ row, col: 1 + intW - ip.length + i, value: ip[i], type: "digit", fillable });
    }
    if (fp.length > 0) {
      cells.push({ row, col: 1 + intW, value: ".", type: "point", fillable: false });
      for (let i = 0; i < fp.length; i++) {
        cells.push({ row, col: 1 + intW + 1 + i, value: fp[i], type: "digit", fillable });
      }
    }
  };
  placeNum(strs[0], 0, false);
  cells.push({ row: 1, col: 0, value: isAdd ? "＋" : "－", type: "op", fillable: false });
  placeNum(strs[1], 1, false);
  placeNum(strs[2], 2, true);
  // 答案逐位由右到左填（直式運算順序）
  cells.filter(c => c.fillable).sort((x, y) => y.col - x.col).forEach((c, i) => { c.order = i; });
  return { cells, totalCols: 1 + intW + (dw > 0 ? 1 + dw : 0), kind: "addsub" };
}

function bindVcEvents(q) {
  const layout = q.op === "long_division"
    ? vcDivisionLayout(q.operands[0], q.operands[1])
    : vcAddSubLayout(q.operands[0], q.operands[1], q.op === "add_decimal");
  const grid = document.getElementById("vc-grid");
  const panel = document.getElementById("fill-input-panel");
  grid.style.gridTemplateColumns = `repeat(${layout.totalCols}, var(--vc-cell))`;

  for (const cell of layout.cells) {
    const el = document.createElement("div");
    el.className = "vc-cell";
    el.style.gridRow = String(cell.row + 1);
    el.style.gridColumn = String(cell.col + 1);
    if (cell.fillable) {
      el.classList.add("vc-fillable");
      el.dataset.order = cell.order;
    } else {
      el.textContent = cell.value;
    }
    if (layout.kind === "addsub" && cell.row === 2) el.classList.add("vc-ansline");
    if (layout.kind === "division") {
      if (cell.type === "dividend") el.classList.add("vc-divline");
      if (cell.type === "divisor") el.classList.add("vc-divisor");
      if (cell.type === "product") el.classList.add("vc-sep");
    }
    grid.appendChild(el);
  }

  const fillable = layout.cells.filter(c => c.fillable).sort((x, y) => x.order - y.order);
  quiz._vc = { fillable, idx: 0, errors: 0 };
  const cellEl = (order) => grid.querySelector(`[data-order="${order}"]`);
  cellEl(fillable[0].order).classList.add("vc-active");

  panel.innerHTML = `<div class="numpad" id="numpad">${
    ["1","2","3","4","5","6","7","8","9","","0",""].map(k =>
      k === "" ? "<span></span>" : `<button data-key="${k}">${k}</button>`).join("")}</div>`;
  panel.querySelectorAll("button").forEach(btn => {
    btn.onclick = () => {
      if (quiz.isAnswered) return;
      const vc = quiz._vc;
      const cell = vc.fillable[vc.idx];
      const el = cellEl(cell.order);
      if (btn.dataset.key === cell.value) {
        el.classList.remove("vc-fillable", "vc-active", "vc-error");
        el.classList.add("vc-filled");
        el.textContent = cell.value;
        vc.idx++;
        if (vc.idx >= vc.fillable.length) {
          submitAnswer({ vcErrors: vc.errors });   // 全格完成 → 自動結算
        } else {
          cellEl(vc.fillable[vc.idx].order).classList.add("vc-active");
        }
      } else {
        vc.errors++;
        el.classList.add("vc-error");
        el.addEventListener("animationend", () => el.classList.remove("vc-error"), { once: true });
      }
    };
  });
}

// 比較符號顯示用全形
const COMPARE_DISPLAY = { ">": "＞", "<": "＜", "=": "＝" };

// 填充題互動：點空格選取、輸入面板依空格型態切換（number/comparison/code/text）
function bindFillEvents(q) {
  const boxes = [...document.querySelectorAll(".blank-box")];
  const chips = [...document.querySelectorAll(".q-chip[data-chip]")];
  const rowChips = [...document.querySelectorAll(".q-chip[data-chip-row]")];
  const FW = "１２３４５６７８９";
  const submitBtn = document.getElementById("fib-submit");
  const panel = document.getElementById("fill-input-panel");

  const refresh = () => {
    boxes.forEach((box, i) => {
      const v = quiz._fillValues[i];
      box.textContent = COMPARE_DISPLAY[v] || v;
      box.classList.toggle("active", i === quiz._fillActive && !quiz.isAnswered);
    });
    // 題幹 chip 即時回填：有值顯示值、無值顯示編號；與作答格同步 highlight
    chips.forEach(chip => {
      const i = Number(chip.dataset.chip);
      const v = quiz._fillValues[i];
      chip.textContent = COMPARE_DISPLAY[v] || v || FW[i];
      chip.classList.toggle("filled", !!v);
      chip.classList.toggle("active", i === quiz._fillActive && !quiz.isAnswered);
    });
    rowChips.forEach(chip => {
      chip.classList.toggle("active", Number(chip.dataset.chipRow) === quiz._fillActive && !quiz.isAnswered);
    });
    submitBtn.disabled = quiz._fillValues.some(v => !v);
  };

  const setActive = (idx) => {
    quiz._fillActive = idx;
    refresh();
    renderPanel();
  };

  // 單值型（comparison/code）按下即填，自動跳到下一個空格（輸入摩擦最小化）
  const setSingleValue = (val) => {
    quiz._fillValues[quiz._fillActive] = val;
    const n = quiz._fillValues.length;
    for (let step = 1; step <= n; step++) {
      const i = (quiz._fillActive + step) % n;
      if (!quiz._fillValues[i]) { setActive(i); return; }
    }
    refresh();
  };

  function renderPanel() {
    if (quiz.isAnswered) return;
    const blank = q.blanks[quiz._fillActive];
    const type = blank.input || "number";
    if (type === "number") {
      const keys = ["1","2","3","4","5","6","7","8","9",".","0","del"];
      panel.innerHTML = `<div class="numpad" id="numpad">${keys.map(k =>
        `<button data-key="${k}">${k === "del" ? "⌫" : k}</button>`).join("")}</div>`;
      panel.querySelectorAll("button").forEach(btn => {
        btn.onclick = () => {
          if (quiz.isAnswered) return;
          const k = btn.dataset.key;
          let v = quiz._fillValues[quiz._fillActive];
          if (k === "del") v = v.slice(0, -1);
          else if (k === ".") { if (!v.includes(".") && v.length < 8) v += "."; }
          else if (v.length < 8) v += k;
          quiz._fillValues[quiz._fillActive] = v;
          refresh();
        };
      });
    } else if (type === "comparison" || type === "code") {
      const choices = type === "comparison" ? [">", "<", "="] : (blank.choices || []);
      panel.innerHTML = `<div class="choice-row">${choices.map(c =>
        `<button class="choice-btn" data-val="${c}">${COMPARE_DISPLAY[c] || c}</button>`).join("")}</div>`;
      panel.querySelectorAll(".choice-btn").forEach(btn => {
        btn.onclick = () => { if (!quiz.isAnswered) setSingleValue(btn.dataset.val); };
      });
    } else {  // text：自由輸入（系統鍵盤）
      panel.innerHTML = `<input class="text-input" id="fib-text" type="text" maxlength="10" placeholder="請輸入答案">`;
      const inp = panel.querySelector("#fib-text");
      inp.value = quiz._fillValues[quiz._fillActive];
      inp.oninput = () => {
        if (quiz.isAnswered) return;
        quiz._fillValues[quiz._fillActive] = inp.value.trim();
        refresh();   // 不重繪面板，避免輸入框失焦
      };
    }
  }

  boxes.forEach(box => {
    box.onclick = () => { if (!quiz.isAnswered) setActive(Number(box.dataset.idx)); };
  });
  chips.forEach(chip => {
    chip.onclick = () => { if (!quiz.isAnswered) setActive(Number(chip.dataset.chip)); };
  });
  submitBtn.onclick = () => {
    if (!submitBtn.disabled) submitAnswer([...quiz._fillValues]);
  };
  renderPanel();
}

// 全半形正規化＋去空白（與 data_helpers.normalize_for_compare 對齊）
function normalizeCompare(s) {
  let out = "";
  for (const ch of String(s ?? "")) {
    const c = ch.codePointAt(0);
    if (c >= 0xFF01 && c <= 0xFF5E) out += String.fromCodePoint(c - 0xFEE0);
    else if (ch === "　") out += " ";
    else out += ch;
  }
  return out.replace(/\s+/g, "");
}

// 單格比對：number 用數值相等（63 與 63.0 視為相同），其餘全半形正規化字串比對
function isBlankCorrect(blank, value) {
  const v = String(value ?? "").trim();
  if (blank.input === "number") {
    const got = parseFloat(v), want = parseFloat(blank.answer);
    return Number.isFinite(got) && got === want;
  }
  return normalizeCompare(v) === normalizeCompare(blank.answer);
}

function renderProgress() {
  if (quiz.mode === "full") {
    return renderBarProgress();
  }
  // error mode
  if (quiz.totalForProgress <= 30) {
    // For error mode dots: show answered count
    const answeredCorrect = quiz.answered.filter(a => a.correct).length;
    return renderDots(quiz.totalForProgress, answeredCorrect, quiz.answered);
  }
  return renderBarProgress();
}

function renderDots(total, currentIdx, answered) {
  const currentNum = Math.min(answered.length + 1, total);
  let html = `<div class="progress-bar"><span class="label">第 ${currentNum} 題 / 共 ${total} 題</span>`;
  for (let i = 0; i < total; i++) {
    let cls = "dot";
    if (i < answered.length) {
      cls += answered[i].correct ? " correct" : " wrong";
    }
    if (i === answered.length) cls += " current";
    html += `<span class="${cls}"></span>`;
  }
  html += "</div>";
  return html;
}

function renderBarProgress() {
  let done, total, label;
  if (quiz.mode === "full") {
    // 本批進度：分母＝本批相異題、分子＝其中已 mastered（答對）數（不沿用整單元 doneCount）
    const set = State.getMasteredSet(quiz.unit, quiz.practiceMode);
    total = quiz.batchIds.length;
    done = quiz.batchIds.filter(id => set.has(id)).length;
    label = `已答對 ${done} / ${total} 題`;
  } else {
    // error mode with bar
    total = quiz.totalForProgress;
    done = quiz.answered.filter(a => a.correct).length;
    label = `已答對 ${done} / ${total} 題（剩餘 ${quiz.queue.length} 題）`;
  }
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  return `
    <div class="progress-text">
      <div class="text-line">${label}</div>
      <div class="progress-bar-track"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    </div>`;
}

function renderFeedback(correct, q) {
  playSound(correct ? "correct" : "wrong");

  let wrongHint;
  if (q.type === "vertical_calc") {
    document.querySelectorAll("#fill-input-panel button").forEach(b => { b.disabled = true; });
    wrongHint = `完成了！但填錯過 ${quiz._vc.errors} 次，這題之後會再練一次`;
  } else if (q.type === "fill_in_blank") {
    // 標出每格對錯；錯格旁顯示正解（家長定案：對小孩友善優先）
    document.querySelectorAll("#fill-input-panel button, #fill-input-panel input")
      .forEach(el => { el.disabled = true; });
    document.getElementById("fib-submit").classList.add("hidden");
    document.querySelectorAll(".blank-box").forEach((box, i) => {
      box.classList.remove("active");
      box.classList.add(quiz._fillResults[i] ? "b-correct" : "b-wrong");
      if (!quiz._fillResults[i]) {
        const ans = q.blanks[i].answer;
        box.insertAdjacentHTML("afterend",
          `<span class="blank-correct-val">正解：${COMPARE_DISPLAY[ans] || ans}</span>`);
      }
    });
    document.querySelectorAll(".q-chip[data-chip]").forEach(chip => {
      chip.classList.remove("active");
      chip.classList.add(quiz._fillResults[Number(chip.dataset.chip)] ? "b-correct" : "b-wrong");
    });
    wrongHint = "答錯了，紅色格子旁有正確答案";
  } else if (q.type === "chinese_correction") {
    document.querySelectorAll(".chinese-char").forEach(btn => { btn.disabled = true; });
    const selectedValue = quiz._lastSelected;
    document.querySelectorAll("#q-options .opt-btn").forEach(btn => {
      btn.classList.add("disabled");
      const val = btn.dataset.value;
      if (val === q.answer) btn.classList.add("correct-answer");
      if (!correct && val === selectedValue) btn.classList.add("wrong-answer");
    });
    wrongHint = `答錯了，正確答案是「${q.answer}」`;
  } else {
    const selectedValue = quiz._lastSelected;
    document.querySelectorAll("#q-options .opt-btn").forEach(btn => {
      btn.classList.add("disabled");
      const val = btn.dataset.value;
      if (val === q.answer) btn.classList.add("correct-answer");
      if (!correct && val === selectedValue) btn.classList.add("wrong-answer");
    });
    const isTF = q.type === "true_false";
    const ansLabel = isTF
      ? (q.answer === "true" ? "O（正確）" : "X（錯誤）")
      : `第 ${q.answer} 個選項`;
    wrongHint = `答錯了，正確答案是 ${ansLabel}`;
  }

  const hint = document.getElementById("result-hint");
  hint.classList.remove("hidden", "correct", "wrong");
  if (correct) {
    hint.classList.add("correct");
    hint.textContent = "答對了！";
  } else {
    hint.classList.add("wrong");
    hint.textContent = wrongHint;
  }

  // 作答後說明：答對答錯都顯示，無說明（期中題等）則不渲染
  const explainText = explanations[q.id] || (q.type === "chinese_correction" ? q.note : "");
  if (explainText) {
    const explainEl = document.getElementById("explain-card");
    explainEl.textContent = explainText;
    explainEl.classList.remove("hidden");
  }

  // Update progress display
  const progressContainer = document.querySelector(".progress-bar, .progress-text");
  if (progressContainer) {
    const newProgress = renderProgress();
    const temp = document.createElement("div");
    temp.innerHTML = newProgress;
    progressContainer.replaceWith(temp.firstElementChild);
  }

  const nextBtn = document.getElementById("next-btn");
  nextBtn.classList.remove("hidden");

  // Check if this is last question（full/error 皆以 queue 清空為準）
  const isLast = quiz.queue.length === 0;

  // full 批末 → 批間畫面（「這批完成！」）或通關，非結算清單，故不寫「查看結果」
  nextBtn.textContent = isLast ? (quiz.mode === "full" ? "完成這批" : "查看結果") : "下一題";
  nextBtn.onclick = advance;

  // 作答後跳過已無意義，隱藏（與回報入口互斥）
  const skipArea = document.getElementById("skip-area");
  if (skipArea) skipArea.classList.add("hidden");

  // 題目回報：低調入口，按下原地變 inline 確認
  const flagBtn = document.getElementById("flag-btn");
  const flagConfirm = document.getElementById("flag-confirm");
  document.getElementById("flag-area").classList.remove("hidden");
  flagBtn.onclick = () => { flagBtn.classList.add("hidden"); flagConfirm.classList.remove("hidden"); };
  document.getElementById("flag-no").onclick = () => { flagConfirm.classList.add("hidden"); flagBtn.classList.remove("hidden"); };
  document.getElementById("flag-yes").onclick = flagCurrentQuestion;
}

// ════════════════════════════════════════════════════
// 獎勵插畫選圖（見 docs-dev/reward-illustrations-design.md）
// ════════════════════════════════════════════════════
// <reward-pick-pure>
// 純函式區塊：不得引用外部全域，才能被 tests/test_reward_pick.mjs 抽出獨立 eval。
// rng 以參數注入（rng()→[0,1)）以利測試；缺省當 0。
function rwPoolFor(m, key) { return (m && m.pools && m.pools[key]) || []; }
function rwMergedPool(m, keys) {
  const o = [];
  for (const k of keys) for (const f of rwPoolFor(m, k)) o.push(f);
  return o;
}
// 出現最多的 subtopic；平手用 rng 在並列中挑一個
function rwDominantKey(subs, rng) {
  if (!subs || !subs.length) return null;
  const c = new Map();
  for (const s of subs) c.set(s, (c.get(s) || 0) + 1);
  let mx = 0;
  for (const v of c.values()) if (v > mx) mx = v;
  const tied = [...c].filter(([, v]) => v === mx).map(([k]) => k);
  return tied[Math.floor((rng ? rng() : 0) * tied.length)];
}
// ctx={kind:'batch'|'unit'|'error', subtopic?, unitKeys?, subjectKeys?} → {key, items}（含 roll-up）
function rwResolvePool(m, ctx) {
  if (ctx.kind === "error") return { key: "__generic__", items: rwPoolFor(m, "__generic__") };
  if (ctx.kind === "batch" && ctx.subtopic) {
    const sp = rwPoolFor(m, ctx.subtopic);
    if (sp.length) return { key: ctx.subtopic, items: sp };
  }
  let it = rwMergedPool(m, ctx.unitKeys || []);
  if (it.length) return { key: "__unit__" + (ctx.unitKeys || []).join(","), items: it };
  it = rwMergedPool(m, ctx.subjectKeys || []);
  if (it.length) return { key: "__subject__", items: it };
  it = rwPoolFor(m, "__generic__");
  if (it.length) return { key: "__generic__", items: it };
  return { key: null, items: [] };
}
// shuffle-bag：bag={key:剩餘陣列}；抽完重裝；回傳檔名或 null
function rwDrawFromBag(bag, key, items, rng) {
  if (!key || !items.length) return null;
  let rem = bag[key];
  if (!rem || !rem.length) rem = bag[key] = items.slice();
  const i = Math.floor((rng ? rng() : 0) * rem.length);
  const f = rem[i];
  rem.splice(i, 1);
  return f;
}
// </reward-pick-pure>

const rewardBag = {};   // module-level shuffle-bag；reload 即清（符合「用完即丟」）

// 依情境選一張獎勵插畫路徑（無圖則 null）。
// kind: 'batch'（批末，看這批主力 subtopic）｜'unit'（整單元通關，合併池）｜'error'（錯題清除，通用池）
function pickReward(kind, unit) {
  const ctx = { kind };
  if (kind !== "error") {
    ctx.unitKeys = [...(subtopicsByUnit.get(unit) || [])];
    ctx.subjectKeys = [...(subtopicsBySubject.get(unitToSubject.get(unit)) || [])];
  }
  if (kind === "batch") {
    // 只看真的作答過的題（跳過/回報不在 answered）
    const subs = quiz.answered.map(a => questionMap.get(a.questionId)).filter(Boolean).map(q => q.subtopic);
    ctx.subtopic = rwDominantKey(subs, Math.random);
  }
  const { key, items } = rwResolvePool(rewards, ctx);
  const file = rwDrawFromBag(rewardBag, key, items, Math.random);
  return file ? ("assets/rewards/" + file) : null;
}

// 預載選中的圖，載好（或失敗）才執行 cb，避免畫面空白閃一下。
// 用導覽世代守門：排程後若期間有任何 showPage（如使用者按「離開」回首頁），此 callback 作廢。
function preloadThen(path, cb) {
  const gen = _rewardGen;
  const run = () => { if (gen === _rewardGen) cb(); };
  if (!path) { run(); return; }
  const img = new Image();
  img.onload = run;
  img.onerror = run;
  img.src = path;
}

// 獎勵插畫 <img>（路徑為 null 則空字串）；onerror 自我移除（執行期 404 時不破版）
function rewardImgHtml(path, extraClass = "") {
  return path ? `<img class="reward-img${extraClass}" src="${path}" alt="" onerror="this.remove()">` : "";
}

// 完成畫面先跳一個小獎杯，點了才揭曉插畫；無圖則回空字串＝靜默不顯示（同 rewardImgHtml）。
function rewardRevealHtml(path) {
  if (!path) return "";
  return `<div class="reward-reveal" onclick="window._revealReward(this)">
      <div class="reward-trophy">🏆</div>
      <div class="reward-cap">點獎杯看圖</div>
      ${rewardImgHtml(path, " hidden")}
    </div>`;
}
window._revealReward = (el) => {
  if (el.classList.contains("revealed")) return;
  el.classList.add("revealed");
  const img = el.querySelector(".reward-img");
  if (img) img.classList.remove("hidden");  // 切回 display:block → 觸發 rewardIn 淡入
  playSound("correct");                      // 揭曉的小回饋
};
