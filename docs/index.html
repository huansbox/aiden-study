// UI: 批間畫面（本批完成、整單元尚未通關時）
// ════════════════════════════════════════════════════
function renderBatchBreak() {
  const unitTotal = questionIdsFor(quiz.unit, quiz.subtopic).length;
  const unitDone = State.doneCount(quiz.unit, quiz.subtopic, quiz.practiceMode);
  const nextN = nextBatchSize(unitTotal - unitDone); // 下一批實際題數（依當下剩餘現算）
  const stArg = quiz.subtopic ? `'${quiz.subtopic}'` : "null";
  const modeArg = `'${normalizePracticeMode(quiz.practiceMode)}'`;
  const reward = pickReward("batch", quiz.unit);   // 看這批主力 subtopic 抽圖（缺則 roll-up/null）
  preloadThen(reward, () => {
    document.getElementById("page-summary").innerHTML = `
      <h2>這批完成！</h2>
      ${rewardRevealHtml(reward)}
      <div class="score-label" style="margin-top:8px">整單元進度：已答對 ${unitDone} / ${unitTotal} 題</div>
      <div style="margin-top:24px">
        <button class="summary-btn primary" onclick="window._startFull(${quiz.unit}, ${stArg}, ${modeArg})">再做 ${nextN} 題</button>
        <button class="summary-btn" onclick="window._goHome()">離開</button>
      </div>`;
    showPage("page-summary");
    playSound("complete");
  });
}

// ════════════════════════════════════════════════════
// UI: Summary
// ════════════════════════════════════════════════════
function renderSummary() {
  const correctCount = quiz.answered.filter(a => a.correct).length;
  const total = quiz.answered.length;

  // 此函式只在兩種情形被呼叫：full 模式整單元通關（finishBatch 保證 isCleared），
  // 或錯題模式清空。full 未通關一律由 finishBatch 導向 renderBatchBreak，不到這裡。
  let title, scoreLabel;
  if (quiz.mode === "full") {
    title = "通關！";
    scoreLabel = "所有題目都答對了";
  } else {
    title = "錯題清除！";
    scoreLabel = "所有錯題都答對了";
  }

  const stArg = quiz.subtopic ? `'${quiz.subtopic}'` : "null";
  const modeArg = `'${normalizePracticeMode(quiz.practiceMode)}'`;
  let buttonsHtml = "";
  if (quiz.mode === "full") {
    buttonsHtml = `
      <button class="summary-btn primary" onclick="window._resetAndStartFull(${quiz.unit}, ${stArg}, ${modeArg})">重新挑戰</button>
      <button class="summary-btn" onclick="window._goHome()">回選單</button>`;
  } else {
    buttonsHtml = `
      <button class="summary-btn primary" onclick="window._goHome()">回選單</button>`;
  }

  // full 通關＝整單元合併池；錯題清除＝通用鼓勵池
  const reward = pickReward(quiz.mode === "full" ? "unit" : "error", quiz.unit);
  preloadThen(reward, () => {
    document.getElementById("page-summary").innerHTML = `
      <h2>${title}</h2>
      ${rewardRevealHtml(reward)}
      <div class="score">${correctCount} / ${total}</div>
      <div class="score-label">${scoreLabel}</div>
      <div style="margin-top:24px">${buttonsHtml}</div>`;
    showPage("page-summary");
    playSound(quiz.mode === "full" ? "victory" : "complete");
  });
}

window._goHome = () => { showPage("page-home"); renderHome(); };
window._resetAndStartFull = (unit, subtopic = null, practiceMode = DEFAULT_PRACTICE_MODE) => {
  const mode = normalizePracticeMode(practiceMode);
  State.resetMastered(unit, subtopic, mode);
  State.resetChallenge(challengeKey(unit, subtopic, mode));
  startQuiz("full", unit, subtopic, mode);
};

// ════════════════════════════════════════════════════
// Init
// ════════════════════════════════════════════════════
async function init() {
  try {
    Storage.migrate();
    const saved = Storage.load();
    State.init(saved);

    const resp = await fetch("./questions.json");
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    allQuestions = await resp.json();

    try {
      const expResp = await fetch("./explanations.json");
      if (expResp.ok) explanations = await expResp.json();
    } catch (e) {
      console.warn("explanations.json not loaded:", e);
    }

    try {
      const rwResp = await fetch("./rewards.json");
      if (rwResp.ok) rewards = await rwResp.json();
    } catch (e) {
      console.warn("rewards.json not loaded:", e);
    }

    // Build question map
    questionMap = new Map(allQuestions.map(q => [q.id, q]));

    // reward roll-up 索引：unit/subject → subtopic 集合（選圖缺池時往上合併）
    for (const q of allQuestions) {
      if (!subtopicsByUnit.has(q.unit)) subtopicsByUnit.set(q.unit, new Set());
      subtopicsByUnit.get(q.unit).add(q.subtopic);
      if (!subtopicsBySubject.has(q.subject)) subtopicsBySubject.set(q.subject, new Set());
      subtopicsBySubject.get(q.subject).add(q.subtopic);
      unitToSubject.set(q.unit, q.subject);
    }

    // Clean orphan errorBank / flagged entries
    state.errorBank = state.errorBank.filter(e => questionMap.has(e.questionId));
    state.flagged = state.flagged.filter(f => questionMap.has(f.questionId));
    // 對齊「錯 ≥ 2 次才進錯題庫」新規則：清掉舊版只錯一次（且已答對過）就被收進去的題。
    // 保守起見只在有作答統計可判斷時才清；無 stats 者保留不動。
    state.errorBank = state.errorBank.filter(e => shouldKeepModeError(state.stats, e));
    Storage.save(state);

    // v2→v3：題庫就緒後，從既有 challenge 進度反推 mastered（冪等、無損）
    if (state._needMasteredBackfill) State.backfillMastered();

    renderHome();
    handleRestoreHash();  // 若帶 #restore=（還原捷徑帶回）→ 二次確認後覆蓋
  } catch (e) {
    console.error("Failed to load:", e);
    showPage("page-error");
  }
}

// 網站已開著時，還原捷徑用 Open URL 帶 #restore= 進來是「同文件 hash 變更、不 reload」→ 也要接住
window.addEventListener("hashchange", handleRestoreHash);
init();
})();
</script>
