<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ㄅㄆㄇ 拼字小遊戲</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
    margin: 0; background: #fdf6ec; color: #334;
    display: flex; flex-direction: column; align-items: center;
    user-select: none; -webkit-user-select: none;
  }
  #app { width: 100%; max-width: 720px; padding: 16px; flex: 1; display: flex; flex-direction: column; }
  .screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; }
  .hidden { display: none !important; }

  /* 首頁 */
  .home-title { font-size: 2rem; font-weight: 800; color: #e07b39; margin: 0; }
  .home-sub { font-size: 0.9rem; color: #889; margin: 0; }
  .btn-start {
    font-size: 1.8rem; font-weight: 700; color: #fff; background: #43a047;
    border: none; border-radius: 60px; padding: 26px 64px; cursor: pointer;
    box-shadow: 0 6px 0 #2e7031;
  }
  .btn-start:active { transform: translateY(4px); box-shadow: 0 2px 0 #2e7031; }

  /* 進度點（批內） */
  #dots { display: flex; gap: 8px; justify-content: center; min-height: 14px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; background: #e3d9c8; }
  .dot.on { background: #43a047; }

  /* 重聽鈕 */
  .btn-replay {
    font-size: 2.6rem; background: #fff; border: 3px solid #f0b429; border-radius: 50%;
    width: 96px; height: 96px; cursor: pointer; box-shadow: 0 4px 0 #d9a325;
  }
  .btn-replay:active { transform: translateY(3px); box-shadow: 0 1px 0 #d9a325; }
  .btn-replay:disabled { opacity: 0.45; pointer-events: none; }

  /* 字卡 */
  .choices { display: flex; flex-wrap: wrap; justify-content: center; gap: 24px; width: 100%; }
  .zycard {
    width: min(38vw, 240px); height: min(38vw, 240px);
    display: flex; align-items: center; justify-content: center;
    background: #fff; border: 4px solid #d8c9ae; border-radius: 24px;
    font-size: min(24vw, 150px); font-weight: 700; color: #334;
    cursor: pointer; box-shadow: 0 5px 0 #d8c9ae;
  }
  .zycard:active { transform: translateY(3px); box-shadow: 0 2px 0 #d8c9ae; }
  .zycard.dim { background: #eceae6; color: #c4c1bb; border-color: #dcd9d3; box-shadow: none; pointer-events: none; }
  .zycard.right { background: #e9f8ec; border-color: #43a047; box-shadow: 0 5px 0 #43a047; animation: zyPop 0.5s; }
  .zycard.faded { opacity: 0.25; pointer-events: none; }
  @keyframes zyPop { 0% { transform: scale(1); } 40% { transform: scale(1.14); } 100% { transform: scale(1); } }

  /* 聽音組字 */
  .zycard.small { width: min(26vw, 150px); height: min(26vw, 150px); font-size: min(17vw, 100px); }
  .build-controls { display: flex; align-items: center; gap: 20px; }
  .btn-slow {
    font-size: 1.2rem; background: #fff; border: 3px solid #7cb87c; border-radius: 40px;
    padding: 14px 22px; cursor: pointer; box-shadow: 0 4px 0 #5f9c5f; color: #33623a;
  }
  .btn-slow:active { transform: translateY(3px); box-shadow: 0 1px 0 #5f9c5f; }
  .btn-slow:disabled { opacity: 0.45; pointer-events: none; }
  .build-slots { display: flex; align-items: flex-start; gap: 10px; }
  .slot {
    width: min(20vw, 110px); height: min(20vw, 110px);
    display: flex; align-items: center; justify-content: center;
    border: 4px dashed #d8c9ae; border-radius: 18px;
    font-size: min(14vw, 76px); font-weight: 700; color: #334; background: #fffdf8;
  }
  .slot.filled { border-style: solid; border-color: #43a047; background: #e9f8ec; }
  .slot-tone {
    width: min(10vw, 56px); height: min(10vw, 56px); margin-top: -6px;
    display: flex; align-items: center; justify-content: center;
    border: 3px dashed #d8c9ae; border-radius: 50%;
    font-size: min(8vw, 44px); font-weight: 700; color: #334; background: #fffdf8;
  }
  .slot-tone.filled { border-style: solid; border-color: #43a047; background: #e9f8ec; }
  .tone-btn {
    min-width: min(38vw, 220px); padding: 18px 12px;
    background: #fff; border: 4px solid #d8c9ae; border-radius: 20px;
    font-size: min(11vw, 58px); font-weight: 700; color: #334;
    cursor: pointer; box-shadow: 0 5px 0 #d8c9ae; font-family: inherit;
  }
  .tone-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #d8c9ae; }
  .tone-btn.dim { background: #eceae6; color: #c4c1bb; border-color: #dcd9d3; box-shadow: none; } /* 淘汰但保留可點聽（票面：每顆恆可點聽） */
  .tone-btn.right { background: #e9f8ec; border-color: #43a047; box-shadow: 0 5px 0 #43a047; animation: zyPop 0.5s; }
  .tone-btn.faded { opacity: 0.25; pointer-events: none; }

  /* 介紹卡 */
  .intro-label { font-size: 1.1rem; color: #b8862f; font-weight: 700; letter-spacing: 2px; }
  .intro-card {
    width: min(64vw, 340px); height: min(64vw, 340px);
    display: flex; align-items: center; justify-content: center;
    background: #fff8e8; border: 5px solid #f0b429; border-radius: 32px;
    font-size: min(42vw, 220px); font-weight: 800; color: #b8862f;
    cursor: pointer; box-shadow: 0 6px 0 #d9a325; animation: zyPop 0.6s;
  }
  .intro-card.multi { font-size: min(19vw, 100px); } /* 音節示範卡 2–3 字（含調號）不溢出 */
  .btn-next {
    font-size: 2.2rem; color: #fff; background: #43a047; border: none; border-radius: 50px;
    padding: 16px 56px; cursor: pointer; box-shadow: 0 5px 0 #2e7031;
  }
  .btn-next:active { transform: translateY(3px); box-shadow: 0 2px 0 #2e7031; }

  /* 真實詞卡（拼對音節的北極星時刻） */
  .word-card { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; animation: zyPop 0.6s; }
  .word-emoji { font-size: min(45vw, 230px); line-height: 1.1; }
  .word-text { font-size: 2.4rem; font-weight: 800; color: #e07b39; }

  /* 批末獎勵（複製自哥哥版 docs/index.html 獎杯揭曉 CSS，commit af0d199 時期版本，尺寸微調） */
  .reward-img {
    display: block; width: min(60vw, 320px); aspect-ratio: 1 / 1; object-fit: cover;
    margin: 0 auto; border-radius: 16px; box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    animation: rewardIn 0.3s ease-out;
  }
  @keyframes rewardIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
  .reward-reveal { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .reward-trophy {
    font-size: 76px; line-height: 1;
    animation: trophyPop 0.5s cubic-bezier(.18,.89,.32,1.28) both, trophyIdle 1.8s ease-in-out 0.7s infinite;
  }
  .reward-cap { font-size: 0.95rem; color: #888; }
  .reward-reveal:active .reward-trophy { animation: none; transform: scale(0.92); }
  .reward-reveal.revealed .reward-trophy, .reward-reveal.revealed .reward-cap { display: none; }
  @keyframes trophyPop { 0% { transform: scale(0) rotate(-18deg); opacity: 0; } 60% { transform: scale(1.18) rotate(7deg); } 100% { transform: scale(1) rotate(0); opacity: 1; } }
  @keyframes trophyIdle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

  /* 批間／訊息畫面 */
  .break-emoji { font-size: 4rem; }
  .break-title { font-size: 1.6rem; font-weight: 800; color: #e07b39; margin: 0; }
  .btn-again {
    font-size: 1.4rem; font-weight: 700; color: #fff; background: #43a047; border: none;
    border-radius: 40px; padding: 18px 44px; cursor: pointer; box-shadow: 0 5px 0 #2e7031;
  }
  .btn-again:active { transform: translateY(3px); box-shadow: 0 2px 0 #2e7031; }
  .btn-quiet {
    font-size: 1rem; color: #667; background: #eee6d8; border: none;
    border-radius: 30px; padding: 12px 28px; cursor: pointer;
  }
  .msg { font-size: 1rem; color: #667; line-height: 1.8; text-align: center; max-width: 420px; }
</style>
</head>
<body>
<div id="app">
  <div id="screen-home" class="screen">
    <h1 class="home-title">ㄅㄆㄇ 拼字小遊戲</h1>
    <p class="home-sub">給弟弟的注音練習（家長按開始）</p>
    <button class="btn-start" id="btn-start">▶ 開始練習</button>
  </div>
  <div id="screen-card" class="screen hidden">
    <div id="dots"></div>
    <div id="card-area" class="screen" style="flex:1; width:100%"></div>
  </div>
  <div id="screen-break" class="screen hidden">
    <div class="break-emoji">🎉</div>
    <h2 class="break-title">這一批練完了！</h2>
    <div id="break-reward"></div>
    <button class="btn-again" id="btn-again">再一批</button>
    <button class="btn-quiet" id="btn-done">今天到這裡</button>
  </div>
  <div id="screen-msg" class="screen hidden">
    <div class="break-emoji" id="msg-emoji">🎙️</div>
    <p class="msg" id="msg-text"></p>
    <button class="btn-quiet" id="btn-msg-home">回首頁</button>
  </div>
</div>
<script>
"use strict";

// <zhuyin-core-pure>
// 注意：此區塊到 </zhuyin-core-pure> 為止不得引用外部全域變數，才能被 node 測試抽出獨立 eval。
// 對應測試：node --test tests/test_zhuyin_core.mjs。
// 排程＝MVP 簡化版（issue #17）：錯題優先 → 新卡按進場序 → 複習卡（rng 洗牌）；
// 三檔優先權佇列／配額／熟練抽查／suspend 留擴充批（父 spec #15）。

function zyCardId(glyph) { return "sym:" + glyph; }
function zySylId(syl) { return "syl:" + syl.onset + syl.rime + syl.tone; }

// 進度存檔載入：壞 JSON／版本不符 → 全新空檔（schemaVersion 為日後遷移預留）
function zyLoadProgress(raw) {
  const empty = { schemaVersion: 1, cards: {} };
  if (!raw) return empty;
  try {
    const p = JSON.parse(raw);
    if (!p || p.schemaVersion !== 1 || typeof p.cards !== "object" || !p.cards || Array.isArray(p.cards)) return empty;
    return p;
  } catch (e) {
    return empty;
  }
}

function zyCardState(progress, id) {
  return progress.cards[id] || { introduced: false, wrong: false, practiced: 0, correct: 0 };
}

// 複製自哥哥版 docs/index.html 的 shuffle（commit 7a8d900 時期版本），加 rng 注入供測試
function zyShuffle(arr, rng) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function zyEnteredGlyphs(entryOrder, progress) {
  return entryOrder.filter((g) => zyCardState(progress, zyCardId(g)).introduced);
}

// 題池展開：符號卡按進場序恆在池；音節卡在聲符與韻符都已進場後進池（依 content 順序）
function zyBuildPool(entryOrder, symbolAudio, syllables, progress) {
  const pool = [];
  for (const g of entryOrder) pool.push({ id: zyCardId(g), kind: "sym", glyph: g, promptKey: symbolAudio[g] });
  const entered = new Set(zyEnteredGlyphs(entryOrder, progress));
  for (const y of syllables || []) {
    if (entered.has(y.onset) && entered.has(y.rime))
      pool.push({ id: zySylId(y), kind: "syl", syl: y, promptKey: y.audio });
  }
  return pool;
}

// 組批：題目提示音缺檔的卡直接過濾（聲音導向 app 不出無聲題）。
// 錯題優先 → 新卡按池序 → 複習卡（已學無錯，rng 洗牌）；上限 max、可出卡數不足時批就這麼大。
function zyBuildBatch({ pool, progress, hasAudio, max, rng }) {
  const wrong = [], fresh = [], review = [];
  for (const c of pool) {
    if (!c.promptKey || !hasAudio(c.promptKey)) continue;
    const st = zyCardState(progress, c.id);
    if (!st.introduced) fresh.push(c);
    else if (st.wrong) wrong.push(c);
    else review.push(c);
  }
  return wrong.concat(fresh, zyShuffle(review, rng)).slice(0, max);
}

// 卡片呈現型態：
// 符號卡：首次＝不判分介紹卡；判分題只在已進場池 ≥2 時出（湊不出選擇題就再看一次介紹卡）。
// 音節卡：首次＝不判分示範卡（demo）；第二次起＝聽音組字（build）。
// 音節卡不看 enteredCount：zyBuildPool 入池條件（聲韻皆已進場）已保證組字選符步池 ≥2；
// 改入池規則時此不變量必須一起檢視，否則 build 步的 zyPickChoices 可能回 null。
function zyCardKind(card, progress, enteredCount) {
  const introduced = zyCardState(progress, card.id).introduced;
  if (card.kind === "sym") {
    if (!introduced) return "intro";
    return enteredCount >= 2 ? "quiz" : "intro";
  }
  return introduced ? "build" : "demo";
}

// 分段慢速示範鏈「ㄇ⋯ㄚ⋯ㄇㄚ」：任一段缺檔 → fallback 常速完整音節；連音節也缺 → 空（靜默）
function zyDemoChain(syl, symbolAudio, hasAudio) {
  const segs = [symbolAudio[syl.onset], symbolAudio[syl.rime], syl.audio];
  if (segs.every((k) => k && hasAudio(k))) return segs;
  return hasAudio(syl.audio) ? [syl.audio] : [];
}

// 聲調步的四顆鈕：同聲韻的四聲變體音檔 key（content 沒收錄該調或音檔缺檔→null，
// 呼叫端據此走「中性音效＋重播題目」的答錯回饋，不會誤播正解音）
function zyToneOptions(syl, syllables, hasAudio) {
  return [1, 2, 3, 4].map((t) => {
    const hit = (syllables || []).find((y) => y.onset === syl.onset && y.rime === syl.rime && y.tone === t);
    return { tone: t, audio: hit && hasAudio(hit.audio) ? hit.audio : null };
  });
}

// 聽音組字判分狀態機：狀態×事件全枚舉（issue #18）。
// 狀態＝phase（onset→rime→tone→done）×hadWrong；事件＝pick(correct)。
// 中途語意：任一步選錯＝留在原步續選（答錯迴圈同聽音辨認）、整題記 hadWrong；
// 三步全程第一下都對才算「第一下就對」（!hadWrong）。done 後任何事件不再轉移。
function zyBuildStep(state, correct) {
  const hadWrong = state.hadWrong || !correct;
  if (state.phase === "onset") {
    return correct ? { phase: "rime", hadWrong, effect: "confirm-onset" }
                   : { phase: "onset", hadWrong, effect: "retry" };
  }
  if (state.phase === "rime") {
    return correct ? { phase: "tone", hadWrong, effect: "confirm-rime" }
                   : { phase: "rime", hadWrong, effect: "retry" };
  }
  if (state.phase === "tone") {
    return correct ? { phase: "done", hadWrong, effect: "celebrate" }
                   : { phase: "tone", hadWrong, effect: "retry" };
  }
  return { phase: "done", hadWrong: state.hadWrong, effect: "noop" };
}

// 干擾項：只從已進場符號抽；池不足 4 降 3／2 選一（下限 2，池 1 出不了題回 null）。
// 不變量：正解恰出現一次、無重複、全部來自已進場池。
function zyPickChoices(target, entered, rng, maxChoices = 4) {
  if (!entered.includes(target) || entered.length < 2) return null;
  const n = Math.min(maxChoices, entered.length);
  const others = zyShuffle(entered.filter((g) => g !== target), rng).slice(0, n - 1);
  const pos = Math.floor(rng() * n);
  others.splice(pos, 0, target);
  return others;
}

// 答完一題的狀態轉移。wrongThisBatch＝本批對此卡曾點錯過（含本次）：
// 批尾複驗答對「計一次答對」但不洗掉 wrong——錯過的卡下一批仍優先重出，
// 直到某批第一下就對才清除（否則跨批錯題優先永遠踩不到）。
function zyOnQuizResult(state, firstTapCorrect, wrongThisBatch) {
  return {
    ...state,
    wrong: !!wrongThisBatch || !firstTapCorrect,
    practiced: state.practiced + 1,
    correct: state.correct + (firstTapCorrect ? 1 : 0),
  };
}

// 批內佇列前進：第一下就對→移出；否則排批尾複驗（直到某次第一下就對）
function zyAdvanceQueue(queue, firstTapCorrect) {
  const rest = queue.slice(1);
  return firstTapCorrect ? rest : rest.concat(queue[0]);
}
// </zhuyin-core-pure>

// ════════════════════════════════════════════════════
// 音效（Web Audio 合成，播放失敗不影響作答）
// 來源：複製自哥哥版 docs/index.html 的 SOUND_PATTERNS/playTone/playSound
// （commit 7a8d900 時期版本）再裁剪——wrong 本就是柔和低音雙音，直接當「中性音效」用。
// ════════════════════════════════════════════════════
let audioCtx = null;
const SOUND_PATTERNS = {
  correct: [
    [0.00, 523.25, 0.11, { type: "triangle", volume: 0.22 }],
    [0.09, 659.25, 0.13, { type: "triangle", volume: 0.22 }],
    [0.18, 783.99, 0.15, { type: "triangle", volume: 0.18 }],
  ],
  neutral: [
    [0.00, 246.94, 0.08, { type: "sine", volume: 0.20 }],
    [0.10, 196.00, 0.14, { type: "sine", volume: 0.18 }],
  ],
  complete: [
    [0.00, 523.25, 0.12, { volume: 0.20 }],
    [0.11, 659.25, 0.12, { volume: 0.22 }],
    [0.22, 783.99, 0.13, { volume: 0.23 }],
    [0.34, 1046.50, 0.28, { volume: 0.24 }],
  ],
};
function getAudioContext() {
  const Ctor = window.AudioContext || window.webkitAudioContext;
  if (!Ctor) return null;
  if (!audioCtx) audioCtx = new Ctor();
  if (audioCtx.state === "suspended") {
    const r = audioCtx.resume();
    if (r && typeof r.catch === "function") r.catch(() => {});
  }
  return audioCtx;
}
function playTone(ctx, start, freq, duration, options = {}) {
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = options.type || "sine";
  osc.frequency.setValueAtTime(freq, start);
  gain.gain.setValueAtTime(0.0001, start);
  gain.gain.exponentialRampToValueAtTime(options.volume || 0.2, start + 0.018);
  gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(start);
  osc.stop(start + duration + 0.03);
}
function playSound(name) {
  try {
    const ctx = getAudioContext();
    const pattern = SOUND_PATTERNS[name];
    if (!ctx || !pattern) return;
    const start = ctx.currentTime + 0.01;
    for (const [offset, freq, duration, opts] of pattern) playTone(ctx, start + offset, freq, duration, opts);
  } catch (e) {
    // 音效只是情緒回饋；瀏覽器若擋播放，答題流程照常。
  }
}

// ════════════════════════════════════════════════════
// 語音播放 adapter：單一 Audio 元素、換 src 連播
// （iPad spike 真機驗證的模式：一次手勢解鎖後程式化換 src 播放成立，
//  見 docs/zhuyin-tts-spike.html 第 6 區＋issue #15 開工拍板紀錄）
// ════════════════════════════════════════════════════
const voice = new Audio();
const SILENT_WAV = "data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=";
function unlockAudio() {
  try {
    voice.src = SILENT_WAV;
    const p = voice.play();
    if (p && typeof p.catch === "function") p.catch(() => {});
  } catch (e) { /* 解鎖失敗照常進流程，首播仍在手勢鏈內 */ }
  getAudioContext();
}
// 連播鏈：一段 ended → 間隔 350ms → 播下一段（示範卡「ㄇ⋯ㄚ⋯ㄇㄚ」、慢慢聽、聲調對比用）。
// 新的 playChain/playVoice 會取消未播完的鏈；缺檔段先過濾（story 27 靜默降級）。
let chainKeys = [];
let chainTimer = null;
voice.addEventListener("ended", () => {
  // 過期 ended 防護：舊段自然播完的 ended 可能已排入事件佇列、新播放才啟動——
  // 派發時若元素已換 src 開新播放（voice.ended 為 false），不得推進新鏈。
  if (!voice.ended || !chainKeys.length) return;
  chainTimer = setTimeout(() => {
    chainTimer = null;
    const k = chainKeys.shift();
    if (k) playNow(k);
  }, 350);
});
function playNow(key) {
  try {
    voice.src = app.audioDir + key + app.audioExt;
    const p = voice.play();
    if (p && typeof p.catch === "function") p.catch(() => {});
  } catch (e) { /* 播不出來不擋作答 */ }
}
function stopChain() {
  chainKeys = [];
  if (chainTimer) { clearTimeout(chainTimer); chainTimer = null; }
}
function playChain(keys) {
  stopChain();
  const usable = (keys || []).filter((k) => k && app.hasAudio.has(k));
  if (!usable.length) return; // 全缺檔靜默略過（story 27）
  chainKeys = usable.slice(1);
  playNow(usable[0]);
}
function playVoice(key) { playChain([key]); }

// ════════════════════════════════════════════════════
// 批末獎勵：MVP 借用哥哥版 __generic__ 通用池（../rewards.json＋../assets/rewards/）。
// 以下三個函式複製自哥哥版 docs/index.html 的 rwDrawFromBag／rewardRevealHtml／_revealReward
// （commit af0d199 時期版本）再裁剪：單一池不需 roll-up，缺 manifest／缺圖靜默不顯示。
// ════════════════════════════════════════════════════
const rewardBag = {}; // shuffle-bag：抽完重裝；reload 即清
function rwDrawFromBag(bag, key, items, rng) {
  if (!key || !items.length) return null;
  let rem = bag[key];
  if (!rem || !rem.length) rem = bag[key] = items.slice();
  const i = Math.floor((rng ? rng() : 0) * rem.length);
  const f = rem[i];
  rem.splice(i, 1);
  return f;
}
function drawRewardPath() {
  const pool = app.rewards && app.rewards.pools && app.rewards.pools.__generic__;
  if (!Array.isArray(pool) || !pool.length) return null;
  const file = rwDrawFromBag(rewardBag, "__generic__", pool, Math.random);
  return file ? "../assets/rewards/" + file : null;
}
function rewardRevealHtml(path) {
  if (!path) return "";
  return `<div class="reward-reveal" onclick="window._revealReward(this)">
      <div class="reward-trophy">🏆</div>
      <div class="reward-cap">點獎杯看圖</div>
      <img class="reward-img hidden" src="${path}" alt="" onerror="this.closest('.reward-reveal').remove()">
    </div>`;
}
window._revealReward = (el) => {
  if (el.classList.contains("revealed")) return;
  el.classList.add("revealed");
  const img = el.querySelector(".reward-img");
  if (img) img.classList.remove("hidden"); // 切回 display:block → 觸發 rewardIn 淡入
  playSound("correct");                     // 揭曉的小回饋
};

// ════════════════════════════════════════════════════
// App 狀態與流程
// ════════════════════════════════════════════════════
const STORAGE_KEY = "aiden_zhuyin_v1";
const BATCH_MAX = 5;
const TAP_GUARD_MS = 400; // 換題後短暫不吃點擊（防連點誤答，story 13）
const TONE_MARK = { 1: "", 2: "ˊ", 3: "ˇ", 4: "ˋ" };

const app = {
  content: null,     // 載入成功的 content.json（null＝init 未成／失敗，開始鈕會重試）
  audioDir: "", audioExt: "",
  entryOrder: [],
  symbolAudio: {},   // glyph -> 音檔 key
  syllables: [],     // content.syllables（音節卡與聲調鈕用）
  rewards: null,     // ../rewards.json manifest（缺＝批末靜默無獎圖）
  hasAudio: new Set(),
  progress: null,
  queue: [],         // 本批剩餘卡（zyBuildPool 的卡物件）
  doneCount: 0,      // 本批已完成題數（含複驗）
  wrongThisBatch: new Set(), // 本批曾點錯過的卡 id（複驗答對不洗 wrong 用）
  answered: false,   // 當前判分題已出結果（防 auto-advance 期間再點）
  firstTap: true,    // 當前聽音辨認題還沒點錯過（組字題由 buildState.hadWrong 追蹤）
  buildState: null,  // 組字題狀態機 {phase, hadWrong}
  stepLock: false,   // 組字子步驟切換動畫期間不吃點擊
  shownAt: 0,
  replayTimer: null,
  advanceTimer: null,  // 整卡層級：答對後推進下一卡
  stepTimer: null,     // 組字子步驟切換（confirm 空窗）——與換卡語意分開，勿混用
};

function saveProgress() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(app.progress)); } catch (e) { /* 寫不進去照常練 */ }
}

function showScreen(id) {
  for (const el of document.querySelectorAll("#app > .screen")) el.classList.add("hidden");
  document.getElementById(id).classList.remove("hidden");
}

function clearTimers() {
  if (app.replayTimer) { clearTimeout(app.replayTimer); app.replayTimer = null; }
  if (app.advanceTimer) { clearTimeout(app.advanceTimer); app.advanceTimer = null; }
  if (app.stepTimer) { clearTimeout(app.stepTimer); app.stepTimer = null; }
  app.stepLock = false; // stepLock 的解鎖繫在 stepTimer 上，殺 timer 必須一併解鎖
  stopChain();
}

function renderDots() {
  const total = app.doneCount + app.queue.length;
  let html = "";
  for (let i = 0; i < total; i++) html += `<div class="dot${i < app.doneCount ? " on" : ""}"></div>`;
  document.getElementById("dots").innerHTML = html;
}

function startBatch() {
  const pool = zyBuildPool(app.entryOrder, app.symbolAudio, app.syllables, app.progress);
  app.queue = zyBuildBatch({
    pool,
    progress: app.progress,
    hasAudio: (k) => app.hasAudio.has(k),
    max: BATCH_MAX,
    rng: Math.random,
  });
  app.doneCount = 0;
  app.wrongThisBatch = new Set();
  if (!app.queue.length) {
    document.getElementById("msg-text").textContent =
      "還沒有可以練的卡——題目音檔還沒錄好。請家長先用錄音工具頁（recorder.html）錄音，放進 assets/audio/ 後再來。";
    document.getElementById("msg-emoji").textContent = "🎙️"; // init 失敗路徑可能殘留 😢
    showScreen("screen-msg");
    return;
  }
  showScreen("screen-card");
  renderCard();
}

function renderCard() {
  clearTimers();
  const card = app.queue[0];
  const entered = zyEnteredGlyphs(app.entryOrder, app.progress);
  const kind = zyCardKind(card, app.progress, entered.length);
  app.answered = false;
  app.firstTap = true;
  app.buildState = null;
  app.stepLock = false;
  app.shownAt = performance.now();
  renderDots();
  if (kind === "intro") renderIntro(card);
  else if (kind === "quiz") renderQuiz(card, entered);
  else if (kind === "demo") renderDemo(card);
  else renderBuild(card);
}

function tapGuarded() { return performance.now() - app.shownAt < TAP_GUARD_MS; }

// 介紹卡（符號首次）／示範卡（音節首次）共用骨架：不判分，大字卡＋播音；點卡重聽、按 ➜ 進下一題
function renderTeaching(card, { label, display, replayKeys }) {
  const area = document.getElementById("card-area");
  const multi = display.length > 1 ? " multi" : ""; // 音節示範卡 2–3 字，需縮字才不溢出
  area.innerHTML = `
    <div class="intro-label">${label}</div>
    <div class="intro-card${multi}" id="intro-card">${display}</div>
    <button class="btn-next" id="btn-intro-next">➜</button>`;
  document.getElementById("intro-card").addEventListener("click", () => playChain(replayKeys));
  document.getElementById("btn-intro-next").addEventListener("click", () => {
    if (tapGuarded()) return;
    app.progress.cards[card.id] = { ...zyCardState(app.progress, card.id), introduced: true };
    saveProgress();
    advanceCard(true); // 教學卡不判分，看完即移出
  });
  playChain(replayKeys);
}

function renderIntro(card) {
  renderTeaching(card, {
    label: "新朋友！聽聽看",
    display: card.glyph,
    replayKeys: [app.symbolAudio[card.glyph]],
  });
}

// 示範卡：「ㄇ⋯ㄚ⋯ㄇㄚ」分段連讀（任一段缺檔→常速整音節）
function renderDemo(card) {
  const y = card.syl;
  renderTeaching(card, {
    label: "新的拼音！聽聽看",
    display: y.onset + y.rime + TONE_MARK[y.tone],
    replayKeys: zyDemoChain(y, app.symbolAudio, (k) => app.hasAudio.has(k)),
  });
}

// 聽音辨認：自動播題目音＋大重聽鈕；答錯＝中性音效→錯卡變灰→自動重播→續選到對
function renderQuiz(card, entered) {
  const glyph = card.glyph;
  const choices = zyPickChoices(glyph, entered, Math.random); // zyCardKind 已保證池 ≥2 且目標已進場
  const area = document.getElementById("card-area");
  area.innerHTML = `
    <button class="btn-replay" id="btn-replay">🔊</button>
    <div class="choices" id="choices">${
      choices.map((g) => `<div class="zycard" data-g="${g}">${g}</div>`).join("")
    }</div>`;
  document.getElementById("btn-replay").addEventListener("click", () => playVoice(app.symbolAudio[glyph]));
  document.getElementById("choices").addEventListener("click", (ev) => {
    const el = ev.target.closest(".zycard");
    if (!el || app.answered || tapGuarded()) return;
    if (el.dataset.g === glyph) {
      app.answered = true;
      if (app.replayTimer) { clearTimeout(app.replayTimer); app.replayTimer = null; }
      document.getElementById("btn-replay").disabled = true; // 空窗期重聽會被下一題換 src 腰斬
      el.classList.add("right");
      for (const other of document.querySelectorAll(".zycard")) {
        if (other !== el) other.classList.add("faded");
      }
      playSound("correct");
      const firstTap = app.firstTap;
      app.advanceTimer = setTimeout(() => completeScored(card, firstTap), 1100);
    } else {
      app.firstTap = false;
      retryFeedback(el, app.symbolAudio[glyph]);
    }
  });
  playVoice(app.symbolAudio[glyph]);
}

// 答錯共通回饋：錯項變灰＋中性音效＋600ms 後重播題目音（聽音辨認與組字聲韻步、缺音聲調步共用）
function retryFeedback(el, replayKey) {
  el.classList.add("dim");
  playSound("neutral");
  if (app.replayTimer) clearTimeout(app.replayTimer);
  app.replayTimer = setTimeout(() => playVoice(replayKey), 600);
}

// 判分卡（聽音辨認／聽音組字）完成：記錄結果＋批推進
function completeScored(card, firstTapCorrect) {
  if (!firstTapCorrect) app.wrongThisBatch.add(card.id);
  app.progress.cards[card.id] = zyOnQuizResult(
    zyCardState(app.progress, card.id), firstTapCorrect, app.wrongThisBatch.has(card.id));
  saveProgress();
  advanceCard(firstTapCorrect);
}

// 聽音組字：播完整音節（有分段素材時接一次分段慢速）→ 依序選聲符、韻符（選對即播該符號音確認）
// → 四顆聲調鈕選調。聲調鈕點了就播該調音（用「比較」代替「回想」）：點錯＝聽到它跟題目不一樣、
// 變灰淘汰、接著連播「你點的→題目」直接對比；點對＝慶祝。任一步錯過整題記錯（zyBuildStep）。
function renderBuild(card) {
  const y = card.syl;
  const has = (k) => app.hasAudio.has(k);
  app.buildState = { phase: "onset", hadWrong: false };
  const area = document.getElementById("card-area");
  area.innerHTML = `
    <div class="build-controls">
      <button class="btn-replay" id="btn-replay">🔊</button>
      <button class="btn-slow" id="btn-slow">🐢 慢慢聽</button>
    </div>
    <div class="build-slots">
      <span class="slot" id="slot-onset"></span><span class="slot" id="slot-rime"></span><span class="slot-tone" id="slot-tone"></span>
    </div>
    <div id="build-area"></div>`;
  document.getElementById("btn-replay").addEventListener("click", () => playVoice(y.audio));
  document.getElementById("btn-slow").addEventListener("click", () =>
    playChain(zyDemoChain(y, app.symbolAudio, has)));
  renderBuildStep(card);
  const demo = zyDemoChain(y, app.symbolAudio, has);
  playChain(demo.length > 1 ? [y.audio, ...demo] : [y.audio]); // 完整音節＋（真有分段素材時）接一次分段慢速
}

function renderBuildStep(card) {
  const y = card.syl;
  const st = app.buildState;
  const buildArea = document.getElementById("build-area");
  app.stepLock = false;
  app.shownAt = performance.now(); // 每個子步驟各有 400ms 防呆
  if (st.phase === "onset" || st.phase === "rime") {
    const target = st.phase === "onset" ? y.onset : y.rime;
    const entered = zyEnteredGlyphs(app.entryOrder, app.progress);
    const choices = zyPickChoices(target, entered, Math.random);
    buildArea.innerHTML = `<div class="choices">${
      choices.map((g) => `<div class="zycard small" data-g="${g}">${g}</div>`).join("")
    }</div>`;
    buildArea.querySelector(".choices").addEventListener("click", (ev) => {
      const el = ev.target.closest(".zycard");
      if (!el || app.stepLock || tapGuarded()) return;
      onBuildPick(card, target, el);
    });
  } else {
    const opts = zyToneOptions(y, app.syllables, (k) => app.hasAudio.has(k));
    buildArea.innerHTML = `<div class="choices tones">${
      opts.map((o) => `<button class="tone-btn" data-tone="${o.tone}" data-k="${o.audio || ""}">${
        y.onset + y.rime + (TONE_MARK[o.tone] || "")
      }</button>`).join("")
    }</div>`;
    buildArea.querySelector(".tones").addEventListener("click", (ev) => {
      const el = ev.target.closest(".tone-btn");
      if (!el || app.answered || tapGuarded()) return;
      onTonePick(card, el);
    });
  }
}

function onBuildPick(card, target, el) {
  const y = card.syl;
  const g = el.dataset.g;
  const r = zyBuildStep(app.buildState, g === target);
  app.buildState = { phase: r.phase, hadWrong: r.hadWrong };
  if (r.effect === "retry") {
    retryFeedback(el, y.audio);
    return;
  }
  // confirm-onset / confirm-rime：填格、播該符號音確認、短暫停後進下一步
  if (app.replayTimer) { clearTimeout(app.replayTimer); app.replayTimer = null; }
  const slot = document.getElementById(r.effect === "confirm-onset" ? "slot-onset" : "slot-rime");
  slot.textContent = g;
  slot.classList.add("filled");
  el.classList.add("right");
  playVoice(app.symbolAudio[g]);
  app.stepLock = true; // 換步空窗不吃點擊（解鎖繫在 stepTimer，clearTimers 會一併重置）
  app.stepTimer = setTimeout(() => { app.stepTimer = null; renderBuildStep(card); }, 800);
}

function onTonePick(card, el) {
  const y = card.syl;
  const tone = Number(el.dataset.tone);
  const toneKey = el.dataset.k || null;
  if (el.classList.contains("dim")) { // 已淘汰的鈕保留「點聽」：只播該調音、不再判分（票面：每顆恆可點聽）
    if (toneKey) playVoice(toneKey);
    return;
  }
  const r = zyBuildStep(app.buildState, tone === y.tone);
  app.buildState = { phase: r.phase, hadWrong: r.hadWrong };
  if (r.effect === "retry") {
    if (toneKey) { el.classList.add("dim"); playChain([toneKey, y.audio]); } // 聽你點的→聽題目，直接對比
    else retryFeedback(el, y.audio); // 該調缺音檔：與其他答錯路徑一致（中性音效＋延遲重播）
    return;
  }
  if (r.effect !== "celebrate") return; // 狀態機 totality：done 後的 noop 不得 fall-through 重跑 celebrate
  app.answered = true;
  document.getElementById("btn-replay").disabled = true;
  document.getElementById("btn-slow").disabled = true;
  el.classList.add("right");
  for (const other of document.querySelectorAll(".tone-btn")) {
    if (other !== el) other.classList.add("faded");
  }
  const slotTone = document.getElementById("slot-tone");
  slotTone.textContent = TONE_MARK[y.tone]; // 一聲無記號，與聲調鈕呈現一致（filled 綠底已標示完成）
  slotTone.classList.add("filled");
  playVoice(y.audio);
  app.replayTimer = setTimeout(() => playSound("correct"), 400);
  // 有詞連結→先跳真實詞卡（北極星時刻）再推進；沒有→一般答對回饋直接推進
  app.advanceTimer = setTimeout(() => {
    if (y.word) renderWordCard(card, !r.hadWrong);
    else completeScored(card, !r.hadWrong);
  }, 1500);
}

// 真實詞卡：emoji 大圖＋詞語音（「馬！」）；詞語音缺檔只顯圖（story 7、8）
function renderWordCard(card, firstTapCorrect) {
  clearTimers();
  const w = card.syl.word;
  const area = document.getElementById("card-area");
  area.innerHTML = `
    <div class="word-card" id="word-card">
      <div class="word-emoji">${w.emoji}</div>
      <div class="word-text">${w.text}</div>
    </div>`;
  document.getElementById("word-card").addEventListener("click", () => playVoice(w.audio));
  playVoice(w.audio);
  app.advanceTimer = setTimeout(() => completeScored(card, firstTapCorrect), 2600);
}

// 完成一張卡後的批推進（intro/quiz 共用；#18 加新卡型也走這裡）
function advanceCard(firstTapCorrect) {
  app.doneCount++;
  app.queue = zyAdvanceQueue(app.queue, firstTapCorrect);
  if (app.queue.length) renderCard();
  else finishBatch();
}

// 批間畫面：「再一批／今天到這裡」（複製自哥哥版 docs/index.html renderBatchBreak pattern，commit 7a8d900 時期版本）
function finishBatch() {
  clearTimers();
  const path = drawRewardPath();
  document.getElementById("break-reward").innerHTML = rewardRevealHtml(path); // null→空＝靜默無獎圖
  if (path) new Image().src = path; // 預載：點獎杯揭曉時圖多半已就緒
  showScreen("screen-break");
  playSound("complete");
}

// ════════════════════════════════════════════════════
// 初始化
// ════════════════════════════════════════════════════
async function init() {
  // content.json 是外部資料邊界：連形狀壞掉（合法 JSON 但缺欄位）也要進錯誤畫面，
  // 不能讓 ready reject 把「開始練習」變成無聲死按鈕。
  try {
    const res = await fetch("content.json");
    if (!res.ok) throw new Error(res.status);
    const content = await res.json();
    app.audioDir = content.audio.dir;
    app.audioExt = content.audio.ext;
    app.entryOrder = content.circles[0].entryOrder;
    app.syllables = content.syllables;
    for (const s of content.symbols) app.symbolAudio[s.glyph] = s.audio;
    app.progress = zyLoadProgress((() => { try { return localStorage.getItem(STORAGE_KEY); } catch (e) { return null; } })());

    // 音檔可用性探測（HEAD content.json 宣告的全部 key；失敗＝缺檔，組批時過濾）
    const keys = [];
    for (const s of content.symbols) keys.push(s.audio);
    for (const y of content.syllables) { keys.push(y.audio); if (y.word) keys.push(y.word.audio); }
    await Promise.all(keys.map(async (k) => {
      try {
        const r = await fetch(app.audioDir + k + app.audioExt, { method: "HEAD" });
        if (r.ok) app.hasAudio.add(k);
      } catch (e) { /* 探不到＝缺檔 */ }
    }));
    // 批末獎勵 manifest（哥哥版共用資產；缺檔/壞檔＝批末靜默無獎圖，不擋任何流程）
    try {
      const rr = await fetch("../rewards.json");
      if (rr.ok) app.rewards = await rr.json();
    } catch (e) { /* 靜默 */ }

    app.content = content; // 最後才標記成功，兼作「init 完成」旗標
  } catch (e) {
    app.content = null;
    document.getElementById("msg-text").textContent = "讀不到 content.json（或內容壞掉），請檢查網路後再按一次開始。";
    document.getElementById("msg-emoji").textContent = "😢";
    showScreen("screen-msg");
  }
}
let ready = init();

const btnStart = document.getElementById("btn-start");
btnStart.addEventListener("click", async () => {
  btnStart.disabled = true; // await 空窗防連點
  unlockAudio(); // iOS：一次手勢解鎖，之後迴圈內程式化換 src 播放
  try {
    await ready;
    if (!app.content) { ready = init(); await ready; } // 上次失敗（如斷網）→ 重試
  } finally {
    btnStart.disabled = false;
  }
  if (!app.content) return; // init 失敗畫面已顯示
  startBatch();
});
document.getElementById("btn-again").addEventListener("click", () => startBatch());
document.getElementById("btn-done").addEventListener("click", () => showScreen("screen-home"));
document.getElementById("btn-msg-home").addEventListener("click", () => showScreen("screen-home"));
</script>
</body>
